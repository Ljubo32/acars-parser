    const coords = waypointCoords(point);
    if (!coords) continue;

    const pointName = String(point?.name || point?.waypoint || point?.position_name || '').trim();
    const key = [
      normaliseWaypointName(pointName),
      coords.lat.toFixed(6),
      coords.lon.toFixed(6),
      String(point?.segment || '').trim()
    ].join('|');

    if (!grouped.has(key)){
      const base = Object.assign({}, point, {
        latitude: coords.lat,
        longitude: coords.lon,
        name: point?.name || point?.waypoint || pointName,
        layers: [],
        _order: index
      });
      grouped.set(key, base);
    }

    const target = grouped.get(key);
    target.lookup_resolved = !!(target.lookup_resolved || point.lookup_resolved);

    const layerFlightLevel = coerceNum(point?.flight_level ?? point?.flightLevel);
    const layerWindDir = coerceNum(point?.wind_dir ?? point?.windDir);
    const layerWindSpeed = coerceNum(point?.wind_speed ?? point?.windSpeed);
    const layerTemperature = coerceNum(point?.temperature ?? point?.temp);
    const hasLayerData = Number.isFinite(layerFlightLevel) || Number.isFinite(layerWindDir) || Number.isFinite(layerWindSpeed) || Number.isFinite(layerTemperature);
    if (hasLayerData){
      const layerKey = [
        Number.isFinite(layerFlightLevel) ? Math.round(layerFlightLevel) : '',
        Number.isFinite(layerWindDir) ? Math.round(layerWindDir) : '',
        Number.isFinite(layerWindSpeed) ? Math.round(layerWindSpeed) : '',
        Number.isFinite(layerTemperature) ? Math.round(layerTemperature) : ''
      ].join('|');

      if (!target._layerSeen) target._layerSeen = new Set();
      if (!target._layerSeen.has(layerKey)){
        target._layerSeen.add(layerKey);
        target.layers.push({
          flight_level: layerFlightLevel,
          wind_dir: layerWindDir,
          wind_speed: layerWindSpeed,
          temperature: layerTemperature
        });
      }
    }
  }

  return [...grouped.values()]
    .sort((left, right) => (left._order ?? 0) - (right._order ?? 0))
    .map((point) => {
      const copy = Object.assign({}, point);
      delete copy._order;
      delete copy._layerSeen;
      return copy;
    });
}

function collectWaypointPoints(source, points, defaults){
  if (!source || typeof source !== 'object') return;

  if (Array.isArray(source.points)){
    for (const point of source.points){
      appendWaypointPoint(points, point, defaults);
    }
  }

  if (Array.isArray(source.waypoints)){
    for (const point of source.waypoints){
      appendWaypointPoint(points, point, defaults);
    }
  }

  if (Array.isArray(source.approach_waypoints)){
    for (const point of source.approach_waypoints){
      appendWaypointPoint(points, point, Object.assign({ segment: 'approach' }, defaults || {}));
    }
  }

  if (Array.isArray(source.route_winds)){
    for (const layer of source.route_winds){
      const flightLevel = coerceNum(layer?.flight_level);
      if (!Array.isArray(layer?.waypoints)) continue;
      for (const point of layer.waypoints){
        appendWaypointPoint(points, point, Object.assign({ flight_level: flightLevel, segment: 'route_wind' }, defaults || {}));
      }
    }
  }
}

function getWaypointsFromRow(r){
  if (!r || !r.raw) return [];
  if (waypointRowCache.has(r)){
    return waypointRowCache.get(r);
  }

  const points = [];
  collectWaypointPoints(r.raw, points);
  if (Array.isArray(r.raw.results)){
    for (const result of r.raw.results){
      collectWaypointPoints(result, points);
    }
  }

  const resolved = resolveWaypointSequence(points);
  const aggregated = aggregateWaypointPoints(resolved);
  waypointRowCache.set(r, aggregated);
  return aggregated;
}

function getPrimaryMapPoint(r){
  if (r && isNum(r.lat) && isNum(r.lon)){
    return { lat: r.lat, lon: r.lon };
  }
  const waypoints = getWaypointsFromRow(r);
  for (const point of waypoints){
    const lat = coerceNum(point && (point.latitude ?? point.lat));
    const lon = coerceNum(point && (point.longitude ?? point.lon));
    if (isNum(lat) && isNum(lon)){
      return { lat, lon };
    }
  }
  return null;
}

function renderPage(){
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  const ps = pageSize();
  const start = page * ps;
  const end = Math.min(filteredIdx.length, start + ps);

  for (let j=start; j<end; j++){
    const i = filteredIdx[j];
    const r = rows[i];
    const flightDisplay = getFlightDisplayForRow(r);
    const manufacturerModel = String(r.manufacturerModel || '').trim();

    const tr = document.createElement('tr');

    const tdTs = document.createElement('td');
    tdTs.className = 'tscell';
    tdTs.innerHTML = `<div class="tsmain">${escapeHtml(formatTimestamp(r.timestamp))}</div>`;
    const tdTail = document.createElement('td'); tdTail.textContent = r.tail || '';
    const tdFlight = document.createElement('td'); tdFlight.textContent = flightDisplay;
    const tdLbl = document.createElement('td'); tdLbl.innerHTML = `<span class="pill">${escapeHtml(r.label||'')}</span>`;
    const tdT = document.createElement('td'); tdT.innerHTML = `<span class="type">${escapeHtml(r.type||'')}</span>`;
    const tdC = document.createElement('td'); tdC.textContent = coordStr(r.lat, r.lon);

    const tdM = document.createElement('td');
    const rowWaypoints = getWaypointsFromRow(r);
    if ((isNum(r.lat) && isNum(r.lon)) || rowWaypoints.length){
      const btn = document.createElement('button');
      btn.className = 'btn-mini';
      btn.textContent = 'Prikaži na mapi';
      btn.addEventListener('click', () => openMapForRow(r));
      tdM.appendChild(btn);
    } else {
      tdM.innerHTML = '<span class="kvmini">—</span>';
    }

    const tdD = document.createElement('td');
    tdD.appendChild(makeDetailsCell(i));

    if (manufacturerModel) {
      tdFlight.rowSpan = 2;
      tdLbl.rowSpan = 2;
      tdT.rowSpan = 2;
      tdC.rowSpan = 2;
      tdM.rowSpan = 2;
      tdD.rowSpan = 2;
    }

    tr.appendChild(tdTs);
    tr.appendChild(tdTail);
    tr.appendChild(tdFlight);
    tr.appendChild(tdLbl);
    tr.appendChild(tdT);
    tr.appendChild(tdC);
    tr.appendChild(tdM);
    tr.appendChild(tdD);
    tbody.appendChild(tr);

    if (manufacturerModel) {
      const metaTr = document.createElement('tr');
      metaTr.className = 'metarow';

      const tdMeta = document.createElement('td');
      tdMeta.colSpan = 2;
      tdMeta.innerHTML = `<div class="leftmeta">${escapeHtml(manufacturerModel)}</div>`;
      metaTr.appendChild(tdMeta);

      tbody.appendChild(metaTr);
    }
  }

  updatePageInfo();
  updateSortHeaders();
  document.getElementById('subtitle').textContent =
    `Showing rows ${start+1}-${end} of ${filteredIdx.length} (filtered)`;
}

document.getElementById('file').addEventListener('change', async (ev) => {
  const f = ev.target.files && ev.target.files[0];
  if (!f) return;
  try {
    const txt = await f.text();
    const parsed = JSON.parse(txt);
    applyData(normalizeInput(parsed));
  } catch (e){
    alert("Failed to load JSON: " + e);
  }
});

document.getElementById('waypointsFile').addEventListener('change', async (ev) => {
  const f = ev.target.files && ev.target.files[0];
  if (!f) return;
  try {
    const text = await f.text();
    const lookup = parseWaypointLookupText(text);
    if (!lookup.size){
      alert('Waypoints file did not contain any usable coordinates.');
      return;
    }
    installWaypointLookup(lookup, f.name || 'waypoints file');
  } catch (e) {
    alert('Failed to load Waypoints.txt: ' + e);
  }
});

for (const id of ['q','label','type','onlyCoords','pageSize']){
  document.getElementById(id).addEventListener('input', () => { page = 0; recomputeFilterAndRender(); });
  document.getElementById(id).addEventListener('change', () => { page = 0; recomputeFilterAndRender(); });
}

document.getElementById('reset').addEventListener('click', () => {
  document.getElementById('q').value = '';
  document.getElementById('label').value = '';
  document.getElementById('type').value = '';
  document.getElementById('onlyCoords').checked = false;
  document.getElementById('pageSize').value = '100';
  page = 0;
  recomputeFilterAndRender();
});

document.getElementById('thTail').addEventListener('click', () => toggleSort('tail'));
document.getElementById('thFlight').addEventListener('click', () => toggleSort('flight'));
updateSortHeaders();

document.getElementById('prev').addEventListener('click', () => { page--; clampPage(); renderPage(); });
document.getElementById('next').addEventListener('click', () => { page++; clampPage(); renderPage(); });

document.getElementById('showAllMap').addEventListener('click', () => {
  // Use current filter; if nothing loaded yet, warn
  if (!rows || !rows.length){ alert('Prvo učitaj JSON.'); return; }
  openMapAllFiltered();
});

document.getElementById('closeMap').addEventListener('click', () => {
  document.getElementById('mapModal').style.display = 'none';
});
document.getElementById('mapModal').addEventListener('click', (ev) => {
  if (ev.target && ev.target.id === 'mapModal'){
    document.getElementById('mapModal').style.display = 'none';
  }
});

tryLoadDefaultWaypointLookup();
