<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ACARS Viewer (Fast + Map)</title>

<!-- Leaflet (online). If offline, map button falls back to OpenStreetMap link. -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

<style>
  body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 18px; }
  h1 { margin: 0 0 10px 0; font-size: 20px; }
  .muted { color: #666; }
  .bar, .toprow { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin: 10px 0 14px; }
  input[type="search"] { padding: 8px 10px; min-width: 320px; border:1px solid #ccc; border-radius: 10px; }
  select, button { padding: 8px 10px; border:1px solid #ccc; border-radius: 10px; background: #fff; }
  label.cb { display:flex; gap:6px; align-items:center; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { border-bottom: 1px solid #eee; padding: 8px 8px; vertical-align: top; }
  th { text-align: left; position: sticky; top: 0; background: #fafafa; z-index: 2; }
  th.sortable { cursor: pointer; user-select: none; }
  th.sortable:hover { background: #f1f4f8; }
  th.sortable .sort-indicator { margin-left: 6px; color: #667085; font-size: 11px; }
  .main-table > tbody > tr:hover > td { background: #fcfcff; }
  .kvbox, .kvbox * { background-clip: padding-box; }
  code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; font-size: 12px; }
  .pill { display:inline-block; padding: 2px 8px; border:1px solid #ddd; border-radius: 999px; font-size: 12px; background:#fff; }
  .type { font-weight: 600; }
  details { margin: 6px 0; }
  .kvbox { margin: 8px 0 0; padding: 10px; background: #0b1020 !important; color: #e6edf3 !important; border-radius: 12px; overflow: visible; max-height: none; }
  .kvrows { display: flex; flex-direction: column; gap: 6px; }
  .kvrow { display: grid; grid-template-columns: minmax(170px, var(--keyw, 320px)) minmax(220px, 1fr); gap: 10px; padding: 6px 6px; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .kvk { color: #9cd1ff; overflow-wrap: break-word; word-break: normal; white-space: normal; }
  .kvv { color: #e6edf3; overflow-wrap: break-word; word-break: normal; white-space: normal; }
  .kvmini { color:#b7c2cf; font-size: 12px; }
  .tscell { min-width: 170px; }
  .tsmain { white-space: nowrap; }
  .leftmeta {
    color: #111 !important;
    font-size: 12px;
    white-space: nowrap;
    overflow-wrap: normal;
    word-break: keep-all;
    hyphens: none;
  }
  .metarow td { padding-top: 0; }
  .routecell-main { white-space: nowrap; }
  .routecell-mainline { display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; }
  .routecell-sub { margin-top: 3px; color: #667085; font-size: 12px; white-space: nowrap; }
  .routecell-airport {
    margin-top: 2px;
    color: #344054;
    font-size: 12px;
    line-height: 1.35;
    white-space: nowrap;
    overflow: hidden;

  }
  .routecell-alert { color: #ee3737; font-weight: 600; }
  .route-source-badge {
    display: inline-block;

  /* Big Leaflet popups: 75% viewport */
    .leaflet-popup.big-popup .leaflet-popup-content-wrapper { width: auto; height: auto; max-width: 75vw; max-height: 75vh; }
  .leaflet-popup.big-popup .leaflet-popup-content { width: auto !important; max-width: calc(75vw - 28px) !important; height: auto !important; max-height: calc(75vh - 28px) !important; overflow: auto; margin: 14px; }
  .leaflet-popup.big-popup .kvbox { max-height: none; }
  .leaflet-popup.big-popup .kvrows { max-width: 100%; }

  /* Meteorological statistics panel (coldest / hottest / windiest). */
  .meteo-stats-panel {
    display: flex;
    gap: 8px;
    background: rgba(20, 24, 34, 0.90);

  /* PWI route wind statistics panel — displayed at bottom-right when PWI data is on the map. */
  .pwi-stats-panel {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    background: rgba(20, 24, 34, 0.90);

  .pwi-stats-header { flex: 0 0 100%; display: flex; justify-content: flex-end; }

  /* Each column in the PWI stats panel sizes to its natural content width so that

  color:#111;

/* Per-point flight level label */

  .modal .hdr { display:flex; justify-content: space-between; align-items:center; padding: 10px 12px; border-bottom: 1px solid #eee; gap: 10px; }

<body>
  <h1>ACARS Viewer (Fast + Map)</h1>
  <div class="muted" id="subtitle">Load JSON to start.</div>

  <div class="toprow">
    <span class="pill">Load JSON:</span>
    <input id="file" type="file" accept=".json,application/json">
    <span class="pill">Load Waypoints:</span>
    <input id="waypointsFile" type="file" accept=".txt,text/plain">
    <span class="pill">Load Airports:</span>
    <input id="airportsFile" type="file" accept=".json,application/json">
    <span class="small muted" id="waypointStatus">Waypoint lookup: not loaded</span>
    <span class="small muted" id="airportStatus">Airport lookup: not loaded</span>
    <span class="small muted" id="routeApiStatus">Route API: idle</span>
    <button id="showAllMap">Prikaži sve na mapi</button>
    <label class="cb small"><input id="lazyDetails" type="checkbox" checked> lazy details (recommended)</label>
  </div>

  <div class="bar">
    <input id="q" type="search" placeholder="Search (tail / label / type / text)..." autocomplete="off">
    <label class="cb"><input id="searchTextOnly" type="checkbox" checked> srch txt</label>
    <label class="cb"><input id="searchProtocolText" type="checkbox"> CPDLC/ADSC/MIAM</label>
    <select id="label"></select>
    <select id="type"></select>
    <label class="cb"><input id="onlyCoords" type="checkbox"> COORDS</label>
    <label class="cb"><input id="onlyFlight" type="checkbox"> FLIGHT</label>
    <label class="cb"><input id="onlyRoute" type="checkbox"> RTE</label>
    <label class="cb"><input id="onlyMeteo" type="checkbox"> METEO</label>
    <label class="cb small">page size
      <select id="pageSize">
        <option value="50">50</option>
        <option value="100" selected>100</option>
        <option value="200">200</option>
        <option value="500">500</option>
      </select>
    </label>
    <button id="reset">Reset</button>
  </div>

  <div class="pager">
    <button id="prev">&larr; Prev</button>
    <button id="next">Next &rarr;</button>
    <span class="pill" id="pageInfo">Page</span>
  </div>

  <table class="main-table">
    <thead>
      <tr>
        <th id="thTimestamp" class="sortable" style="width:170px">Timestamp<span class="sort-indicator"></span></th>
        <th id="thTail" class="sortable" style="width:120px">Tail/Reg<span class="sort-indicator"></span></th>
        <th id="thFlight" class="sortable" style="width:170px">Flight<span class="sort-indicator"></span></th>
        <th style="width:90px">Label</th>
        <th style="width:130px">Type</th>
        <th style="width:110px">Coords</th>
        <th style="width:120px">Map</th>
        <th id="thDetails" class="sortable"><div class="th-controls"><span class="th-title">Summary / Details<span class="sort-indicator"></span></span><button id="toggleAllMessages" class="btn-mini btn-mini-secondary" type="button" title="Raširi ili skupi sve vidljive poruke">Raširi sve</button></div></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <!-- Map modal -->
  <div class="modal" id="mapModal">
    <div class="panel">
      <div class="hdr">
        <div class="title" id="mapTitle">Map</div>
        <div style="display:flex; gap:8px; align-items:center;">
          <a id="osmLink" class="pill" target="_blank" rel="noopener">Open in OSM</a>
          <button id="closeMap" class="btn-mini">Close</button>
        </div>
      </div>
      <div id="map"></div>
    </div>
  </div>

<script>
let rows = [];
let filteredIdx = [];
let page = 0;
let sortState = { key: '', dir: 'asc' };
let waypointLookup = new Map();
let waypointLookupSource = '';
let airportLookup = new Map();
let airportLookupSource = '';
let waypointRowCache = new WeakMap();
const MESSAGE_PREVIEW_LINES = 18;
const expandedMessageRows = new Set();
const DEFAULT_ROUTE_API_BASE = 'http://127.0.0.1:8765';
let routeAPIConfig = null;
const protocolSearchTextCache = new WeakMap();

// Map globals
let map = null;
let marker = null;
let allLayer = null;
// Shared Leaflet canvas renderer — all circleMarker elements are painted onto
// a single <canvas> element instead of individual SVG nodes, keeping the DOM
// size constant regardless of how many markers are plotted.
let canvasRenderer = null;
// Leaflet control that displays the meteo statistics panel. Replaced each time
// the map is opened so the data always matches the current filter result.
let meteoStatsControl = null;
let pwiStatsControl = null;
let pwiSelectedFlightLevel = '';

function isNum(x){
  return (typeof x === 'number') && Number.isFinite(x);
}
function coerceNum(x){
  if (x === null || x === undefined) return null;
  if (typeof x === 'number') return Number.isFinite(x) ? x : null;
  if (typeof x === 'string'){
    const s = x.trim();
    if (s === '') return null;
    if (/^-?\d+(?:\.\d+)?$/.test(s)){
      const n = Number(s);
      return Number.isFinite(n) ? n : null;
    }
  }
  return null;
}

function normaliseWaypointName(value){
  return String(value || '').trim().toUpperCase();
}

function normaliseAirportCodeKey(value){
  const code = String(value || '').trim().toUpperCase();
  return /^[A-Z]{4}$/.test(code) ? code : '';
}

function updateWaypointStatus(){
  const el = document.getElementById('waypointStatus');
  if (!el) return;
  if (!waypointLookup.size){
    el.textContent = 'Waypoint lookup: not loaded';
    return;
  }
  const sourceText = waypointLookupSource ? ` (${waypointLookupSource})` : '';
  el.textContent = `Waypoint lookup: ${waypointLookup.size} loaded${sourceText}`;
}

function setWaypointStatus(text){
  const el = document.getElementById('waypointStatus');
  if (!el) return;
  el.textContent = String(text || '').trim() || 'Waypoint lookup: not loaded';
}

function updateAirportStatus(){
  const el = document.getElementById('airportStatus');
  if (!el) return;
  if (!airportLookup.size){
    el.textContent = 'Airport lookup: not loaded';
    return;
  }
  const sourceText = airportLookupSource ? ` (${airportLookupSource})` : '';
  el.textContent = `Airport lookup: ${airportLookup.size} loaded${sourceText}`;
}

function setAirportStatus(text){
  const el = document.getElementById('airportStatus');
  if (!el) return;
  el.textContent = String(text || '').trim() || 'Airport lookup: not loaded';
}

function parseWaypointLookupText(text){
  const lookup = new Map();
  const lines = String(text || '').split(/\r?\n/);
  for (const line of lines){
    const trimmed = line.trim();
    if (!trimmed || trimmed.startsWith('#')) continue;
    const parts = line.split(',');
    if (parts.length < 3) continue;

    const name = normaliseWaypointName(parts[0]);
    const lat = coerceNum(parts[1]);
    const lon = coerceNum(parts[2]);
    if (!name || !isNum(lat) || !isNum(lon)) continue;
    if (lat < -90 || lat > 90 || lon < -180 || lon > 180) continue;

    const entry = {
      name: String(parts[0] || '').trim(),
      lat,
      lon
    };

    if (!lookup.has(name)){
      lookup.set(name, []);
    }
    lookup.get(name).push(entry);
  }
  return lookup;
}

function installWaypointLookup(lookup, sourceLabel){
  waypointLookup = lookup instanceof Map ? lookup : new Map();
  waypointLookupSource = String(sourceLabel || '').trim();
  waypointRowCache = new WeakMap();
  updateWaypointStatus();
  if (rows.length){
    recomputeFilterAndRender();
  }
}

function getWaypointCandidatesByName(name){
  const key = normaliseWaypointName(name);
  return key ? (waypointLookup.get(key) || []) : [];
}

function parseAirportLookupJSON(text){
  const parsed = JSON.parse(String(text || '[]'));
  if (!Array.isArray(parsed)) return new Map();

  const lookup = new Map();
  for (const entry of parsed){
    if (!entry || typeof entry !== 'object') continue;

    const code = normaliseAirportCodeKey(entry.icao);
    const name = typeof entry.airport === 'string' ? entry.airport.trim() : '';
    if (!code || !name || lookup.has(code)) continue;
    lookup.set(code, name);
  }

  return lookup;
}

function installAirportLookup(lookup, sourceLabel){
  airportLookup = lookup instanceof Map ? lookup : new Map();
  airportLookupSource = String(sourceLabel || '').trim();
  updateAirportStatus();
  if (rows.length){
    recomputeFilterAndRender();
  }
}

function getAirportNameByCode(code){
  const key = normaliseAirportCodeKey(code);
  return key ? String(airportLookup.get(key) || '').trim() : '';
}

function sanitiseAirportDisplayName(name){
  const trimmed = String(name || '').trim();
  if (!trimmed) return '';
  return trimmed.replace(/\s+Airport\s*$/i, '').trim();
}

async function tryLoadDefaultWaypointLookup(){
  const candidates = [];
  try {
    candidates.push(new URL('Waypoints.txt', window.location.href).href);
  } catch (err) {
    // Ignore malformed base URL edge cases.
  }
  candidates.push('./Waypoints.txt', 'Waypoints.txt');

  for (const candidate of [...new Set(candidates)]){
    try {
      const response = await fetch(candidate);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const text = await response.text();
      const lookup = parseWaypointLookupText(text);
      if (lookup.size){
        installWaypointLookup(lookup, 'Waypoints.txt');
        return;
      }
    } catch (err) {
      // Try the next candidate URL.
    }
  }

  if (window.location.protocol === 'file:'){
    setWaypointStatus('Waypoint lookup: browser blocks auto-load in file mode; use Load Waypoints or open via localhost');
    return;
  }

  updateWaypointStatus();
}

async function tryLoadDefaultAirportLookup(){
  const candidates = [];
  try {
    candidates.push(new URL('../internal/airports/airports.json', window.location.href).href);
  } catch (err) {
    // Ignore malformed base URL edge cases.
  }
  candidates.push('../internal/airports/airports.json', './airports.json', 'airports.json');

  for (const candidate of [...new Set(candidates)]){
    try {
      const response = await fetch(candidate);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const text = await response.text();
      const lookup = parseAirportLookupJSON(text);
      if (lookup.size){
        installAirportLookup(lookup, 'airports.json');
        return;
      }
    } catch (err) {
      // Try the next candidate URL.
    }
  }

  if (window.location.protocol === 'file:'){
    setAirportStatus('Airport lookup: browser blocks auto-load in file mode; use Load Airports or open via localhost');
    return;
  }

  updateAirportStatus();
}

function trimTrailingSlashes(value){
  return String(value || '').replace(/\/+$/, '');
}

function getRouteAPIBase(){
  try {
    const params = new URLSearchParams(window.location.search || '');
    const fromQuery = trimTrailingSlashes(params.get('routeApiBase') || params.get('route_api_base') || '');
    if (fromQuery) return fromQuery;
  } catch (err) {
    // Ignore invalid query-string edge cases.
  }
  return DEFAULT_ROUTE_API_BASE;
}

function setRouteAPIStatus(message, isError){
  const el = document.getElementById('routeApiStatus');
  if (!el) return;
  el.textContent = message;
  el.style.color = isError ? '#b42318' : '#667085';
}

function getRouteAPIStatusLabel(){
  const dbPath = String(routeAPIConfig?.db_path || '').trim();
  if (!dbPath) return `Route API: ${getRouteAPIBase()}`;
  return `Route API: ${getRouteAPIBase()} -> ${dbPath}`;
}

async function refreshRouteAPIConfig(){
  try {
    const response = await fetch(`${getRouteAPIBase()}/api/flightroute/config`);
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    routeAPIConfig = await response.json();
    setRouteAPIStatus(getRouteAPIStatusLabel(), false);
  } catch (err) {
    routeAPIConfig = null;
    setRouteAPIStatus(`Route API: ${getRouteAPIBase()} (config unavailable)`, true);
  }
}


// --- Flight level helpers (global, used by individual + all-maps) ---
if (typeof getFlightLevelTextFromAny === 'undefined'){
  function getFlightLevelTextFromAny(obj){
    // Prefer explicit flight_level if present (already FL), otherwise use altitude in feet (altitude_ft).
    const flRaw = (obj?.flight_level ?? obj?.flightLevel ?? obj?.FL ?? obj?.fl ?? null);
    const flNum = coerceNum(flRaw);
    if (isNum(flNum) && flNum > 0 && flNum <= 999){
      return `FL ${Math.round(flNum)}`;
    }

    const altFt = coerceNum(
      obj?.altitude_ft ?? obj?.altitudeFt ?? obj?.alt_ft ?? obj?.altFt ??
      obj?.altitude ?? obj?.Altitude ?? obj?.alt ?? null
    );
    if (!isNum(altFt)) return "";

    // If it's clearly feet (e.g. 32999, 40000) -> FL = ft/100
    if (altFt > 500){
      const fl = Math.round(altFt / 100);
      if (isFinite(fl) && fl > 0) return `FL ${fl}`;
    }

    // Otherwise treat as FL already
    const fl = Math.round(altFt);
    if (!isFinite(fl) || fl <= 0) return "";
    return `FL ${fl}`;
  }
}

if (typeof getFlightLevelTextForRow === 'undefined'){
  function getFlightLevelTextForRow(r){
    if (!r) return "";
    // 1) direct row fields (in some parsers results are already flattened)
    let t = getFlightLevelTextFromAny(r);
    if (t) return t;

    // 2) raw wrapper {message, results}
    const raw = r.raw || null;
    if (raw){
      t = getFlightLevelTextFromAny(raw);
      if (t) return t;

      const res = raw.results;
      if (Array.isArray(res)){
        for (const it of res){
          t = getFlightLevelTextFromAny(it);
          if (t) return t;
        }
      }

      if (raw.message){
        t = getFlightLevelTextFromAny(raw.message);
        if (t) return t;
      }
    }
    return "";
  }
}

if (typeof addFLLabelToLayer === 'undefined'){
  function addFLLabelToLayer(layer, latlng, flText){

    const ico = L.divIcon({
      className: 'ptfl',
      html: `<div class="ptflbox">${escapeHtml(flText)}</div>`,
      iconSize: [1,1],
      iconAnchor: [-6, -8]
    });
    L.marker(latlng, {icon: ico, interactive: false}).addTo(layer);

}



function extractCoords(obj){
  // Try to find a sensible lat/lon pair anywhere in object.
  // Priority: latitude/longitude; then lat/lon; validate ranges.
  const maxDepth = 10;

  function valid(lat, lon){
    return isNum(lat) && isNum(lon) && lat >= -90 && lat <= 90 && lon >= -180 && lon <= 180;
  }

  function walk(o, depth){
    if (depth > maxDepth || o === null || o === undefined) return null;

    // If object has direct pair
    if (typeof o === 'object'){
      const lat1 = coerceNum(o.latitude !== undefined ? o.latitude : (o.lat !== undefined ? o.lat : null));
      const lon1 = coerceNum(o.longitude !== undefined ? o.longitude : (o.lon !== undefined ? o.lon : null));
      if (valid(lat1, lon1)) return {lat: lat1, lon: lon1};
    }

    if (Array.isArray(o)){
      for (const it of o){
        const r = walk(it, depth+1);
        if (r) return r;
      }
      return null;
    }

    if (typeof o === 'object'){
      for (const k of Object.keys(o)){
        const r = walk(o[k], depth+1);
        if (r) return r;
      }
    }
    return null;
  }

  return walk(obj, 0);
}
function extractFlightDisplay(obj){
  if (!obj || typeof obj !== 'object') return "";

  const formatPair = (flight, flightId) => {
    const parts = [];
    if (typeof flight === 'string' && flight.trim()) {
      const normalisedFlight = normaliseFlightCode(flight);
      if (isLikelyFlightCode(normalisedFlight)) parts.push(normalisedFlight);
    }
    if (typeof flightId === 'string' && flightId.trim()) {
      const normalisedFlightID = normaliseFlightCode(flightId);
      if (isLikelyFlightCode(normalisedFlightID)) parts.push(normalisedFlightID);
    }
    return parts.join(' / ');
  };

  const pickFromResults = (results) => {
    if (!Array.isArray(results)) return '';
    for (const result of results){
      if (!result || typeof result !== 'object') continue;
      const display = formatPair(result.flight, result.flight_id ?? result.flightId ?? result.adsc_flight_id);
      if (display) return display;
    }
    return '';
  };

  const direct = formatPair(obj.flight, obj.flight_id ?? obj.flightId ?? obj.adsc_flight_id);
  if (direct) return direct;

  const fromResults = pickFromResults(obj.results);
  if (fromResults) return fromResults;

  const msg = obj.message;
  if (msg && typeof msg === 'object'){
    const nested = formatPair(msg.flight, msg.flight_id ?? msg.flightId);
    if (nested) return nested;
  }

  return "";
}

function getFlightDisplayForRow(row){
  if (!row || typeof row !== 'object') return '';
  const extracted = extractFlightDisplay(row.raw || row);
  if (extracted) return extracted;

  const direct = normaliseFlightCode(String(row.flight || '').trim());
  return isLikelyFlightCode(direct) ? direct : '';
}

function normaliseFlightCode(value){
  if (typeof value !== 'string') return "";
  const trimmed = value.trim();
  if (!trimmed) return "";

  const match = trimmed.match(/^([A-Z-]+)(\d+)([A-Z]?)$/i);
  if (!match) return trimmed.toUpperCase();

  const prefix = match[1].toUpperCase();
  const digits = String(parseInt(match[2], 10));
  const suffix = (match[3] || "").toUpperCase();
  return prefix + digits + suffix;
}

function isLikelyFlightCode(value){
  if (typeof value !== 'string') return false;
  const trimmed = value.trim().toUpperCase();
  if (!trimmed) return false;
  if (!/^[A-Z0-9-]+$/.test(trimmed)) return false;
  return /[A-Z]/.test(trimmed) && /\d/.test(trimmed);
}

function extractFlightLookupKey(obj){
  if (!obj || typeof obj !== 'object') return '';

  const candidates = [
    obj.flight,
    obj.flight_id,
    obj.flightId,
    obj.adsc_flight_id,
  ];

  const message = obj.message;
  if (message && typeof message === 'object'){
    candidates.push(message.flight, message.flight_id, message.flightId, message.adsc_flight_id);
  }

  const results = Array.isArray(obj.results) ? obj.results : [];
  for (const result of results){
    if (!result || typeof result !== 'object') continue;
    candidates.push(result.flight, result.flight_id, result.flightId, result.adsc_flight_id);
  }

  for (const candidate of candidates){
    const key = normaliseFlightCode(candidate);
    if (key && isLikelyFlightCode(key)) return key;
  }

  return '';
}

function getFlightLookupKeyForRow(row){
  if (!row || typeof row !== 'object') return '';
  const extracted = extractFlightLookupKey(row.raw || row);
  if (extracted) return extracted;

  const direct = normaliseFlightCode(String(row.flight || '').trim());
  return isLikelyFlightCode(direct) ? direct : '';
}

function extractRouteLookup(obj){
  if (!obj || typeof obj !== 'object') return null;

  const candidates = [
    obj.route_lookup,
    obj.routeLookup,
    obj.raw && typeof obj.raw === 'object' ? obj.raw.route_lookup : null,
    obj.raw && typeof obj.raw === 'object' ? obj.raw.routeLookup : null
  ];

  for (const candidate of candidates){
    if (!candidate || typeof candidate !== 'object') continue;
    const route = typeof candidate.route === 'string' ? candidate.route.trim() : '';
    const updatedAt = typeof candidate.updatetime === 'string' ? candidate.updatetime.trim() : '';
    if (!route && !updatedAt) continue;
    return { route, updatetime: updatedAt };
  }

  return null;
}

// Returns true when the row contains a decoded route from any parser.
// The field names mirror the JSON keys used by each Go parser and the state
// extractor (internal/state/extractor.go).  All known route signals:
//
//   result.route              string  — ABS, AGFSR, ATNCM, DIS, EB00, FST, H1, ILNGE7X, PDC, …
//   result.origin_icao        string  — MIAM (REP / RTR inner messages)
//   result.waypoints          array   — H1, label10
//   result.route_waypoints    array   — PDC
//   CPDLC element data.route_information                 array  — direct RouteClearance
//   CPDLC element data.route_clearance.route_information array  — combined position+route
// rowHasMeteo returns true if any parsed result in this row contains
// meteorological data:
//   - the ADS-C meteo group (label B6)
//   - label 80 POS messages that include OAT or wind data
//   - FST (label 15) flight status messages with temperature or wind data
// Note: fields stored as int with omitempty are absent from the JSON when
// their value is zero, so e.g. a true temperature of 0 °C will not be matched.
function rowHasMeteo(r) {
  const results = Array.isArray(r?.raw?.results) ? r.raw.results : [];
  for (const result of results) {
    if (typeof result !== 'object' || !result) continue;
    // ADS-C meteo group (label B6, tag 0x09).
    if (result.meteo != null) return true;
    // Label 80 POS messages with outside air temperature or wind data.
    if (result.oat !== undefined || result.wind_speed !== undefined) return true;
    // FST (label 15) flight status messages and label83 POSRPT.
    if (result.temperature !== undefined || result.temperature_c !== undefined || result.wind_speed_kts !== undefined) return true;
  }
  return false;
}

// extractMeteoFromRow extracts meteorological data from a row's parsed
// results and returns a stats entry, or null if no meteo data is present.
// Supports label 80 POS (integer fields), ADS-C meteo groups (float64),
// and FST (label 15) flight status messages.
function extractMeteoFromRow(r, latlng) {
  const tail = (r.tail || r.registration || '').trim();
  const results = Array.isArray(r?.raw?.results) ? r.raw.results : [];
  for (const result of results) {
    if (typeof result !== 'object' || !result) continue;
    let oat = null, windSpeedKmh = null, windDir = null;

    // Label 80 POS: integer fields directly on the result object.
    if (result.oat !== undefined) oat = result.oat;
    if (result.wind_speed !== undefined) {
      windSpeedKmh = result.wind_speed_kmh ?? Math.round(result.wind_speed * 1.852);
      windDir = result.wind_dir ?? null;
    }

    // FST (label 15) flight status: integer temperature (°C) and pre-calculated
    // wind speed fields.  label83 POSRPT uses the same wind fields but emits
    // the temperature as temperature_c.  Note: because Go structs use omitempty
    // on integers, a true temperature of 0 °C will not be present in the JSON.
    if (result.temperature   !== undefined) oat = result.temperature;    // FST
    if (result.temperature_c !== undefined) oat = result.temperature_c;  // POSRPT, rep301, label17
    if (result.wind_speed_kts !== undefined) {
      windSpeedKmh = result.wind_speed_kmh ?? Math.round(result.wind_speed_kts * 1.852);
      windDir = result.wind_direction ?? null;
    }

    // ADS-C meteo group: nested object with float64 fields.
    if (result.meteo != null && typeof result.meteo === 'object') {
      // temperature_invalid is true when the ADS-C 0x800 sentinel is present,
      // meaning the aircraft reported "data not available" for temperature.
      if (result.meteo.temperature_c !== undefined && !result.meteo.temperature_invalid) {
        oat = result.meteo.temperature_c;
      }
      if (result.meteo.wind_speed_kts !== undefined && !result.meteo.wind_dir_invalid) {
        windSpeedKmh = Math.round(result.meteo.wind_speed_kts * 1.852);
        windDir = result.meteo.wind_direction_deg ?? null;
      }
    }

    // Reject physically impossible temperatures — acts as a second line of
    // defence against decoder errors or malformed data.  The range [-90, 70]°C
    // covers the full envelope of commercial aircraft operations.
    if (oat !== null && (oat < -90 || oat > 70)) oat = null;

    if (oat !== null || windSpeedKmh !== null) {
      return { latlng, tail, timestamp: r.timestamp, oat, windSpeedKmh, windDir };
    }
  }
  return null;
}

// buildMeteoStatsControl creates a Leaflet control showing the top 4 coldest,
// hottest, and windiest points from the collected meteo entries.
// Returns null if no usable data is present.
// Each row is clickable — the map flies to the point and the marker popup opens.
function buildMeteoStatsControl(points) {
  const withOAT  = points.filter(p => p.oat !== null);
  const withWind = points.filter(p => p.windSpeedKmh !== null);
  if (!withOAT.length && !withWind.length) return null;

  const coldest  = [...withOAT].sort((a, b) => a.oat - b.oat).slice(0, 4);
  const hottest  = [...withOAT].sort((a, b) => b.oat - a.oat).slice(0, 4);
  const windiest = [...withWind].sort((a, b) => b.windSpeedKmh - a.windSpeedKmh).slice(0, 4);

  function fmtOAT(v) {
    const r = typeof v === 'number' ? Math.round(v) : v;
    return (r >= 0 ? '+' : '') + r + '\u00b0C';
  }
  function fmtWind(p) {
    let s = p.windSpeedKmh + '\u202fkm/h';
    if (p.windDir != null && p.windDir !== 0) s = Math.round(p.windDir) + '\u00b0\u2002' + s;
    return s;
  }
  // colIdx identifies which sorted column (0=coldest, 1=hottest, 2=windiest) so
  // the click handler can look up the point via colPoints[colIdx][rowIdx].
  function colHtml(title, rows, valueFn, colIdx) {
    if (!rows.length) return '';
    let html = `<div class="meteo-stat-col"><div class="meteo-stat-heading">${title}</div>`;
    for (let i = 0; i < rows.length; i++) {
      const p = rows[i];
      const tip = p.tail + (p.timestamp ? ' \u2022 ' + p.timestamp : '');
      html += `<div class="meteo-stat-row" data-col="${colIdx}" data-row="${i}" title="${escapeHtml(tip)}">` +
              `<span class="meteo-stat-val">${valueFn(p)}</span>` +
              `<span class="meteo-stat-tail">${escapeHtml(p.tail || '?')}</span>` +
              '</div>';
    }
    html += '</div>';
    return html;
  }

  // Indexed lookup so click handler can retrieve the full point object (with .marker).
  const colPoints = [coldest, hottest, windiest];

  const ctrl = L.control({ position: 'bottomleft' });
  ctrl.onAdd = function() {
    const div = L.DomUtil.create('div', 'meteo-stats-panel');
    div.innerHTML =
      colHtml('Najhladnije',         coldest,  p => fmtOAT(p.oat), 0) +
      colHtml('Najtoplije',          hottest,  p => fmtOAT(p.oat), 1) +
      colHtml('Najja\u010di vetar', windiest, fmtWind,             2);
    L.DomEvent.disableScrollPropagation(div);
    L.DomEvent.disableClickPropagation(div);
    div.addEventListener('click', function(e) {
      const row = e.target.closest('[data-col]');
      if (!row) return;
      try {
        const colIdx = parseInt(row.dataset.col, 10);
        const rowIdx = parseInt(row.dataset.row, 10);
        const p = colPoints[colIdx]?.[rowIdx];
        if (!p) return;
        map.flyTo(p.latlng, Math.max(map.getZoom(), 6), { animate: true, duration: 0.8 });
        // Open the popup after the fly-to animation completes.
        if (p.marker) map.once('moveend', () => p.marker.openPopup());
      } catch (_) {}
    });
    return div;
  };
  return ctrl;
}

// Loadsheet statistics overlay
// =============================================================================

// The number of rows shown per column in the loadsheet stats panel.
const LS_TOP_N = 16;

// extractLoadsheetResult returns the first loadsheet result object from a row's
// raw.results array, or null if no loadsheet result is present.
function extractLoadsheetResult(r) {
  const results = Array.isArray(r?.raw?.results) ? r.raw.results : [];
  for (const res of results) {
    if (res && (res.msg_type === 'LOADSHEET' || res.type === 'LOADSHEET')) {
      return res;
    }
  }
  return null;
}

// updateLoadsheetStats rebuilds and shows (or hides) the loadsheet statistics
// overlay whenever the filtered row set changes.  The overlay is only shown
// when the type filter is explicitly set to "loadsheet".
function updateLoadsheetStats() {
  const overlay = document.getElementById('lsStatsOverlay');
  if (!overlay) return;

  // Only show the panel when the type filter is set to "LOADSHEET".
  if (document.getElementById('type').value !== 'LOADSHEET') {
    overlay.style.display = 'none';
    return;
  }

  // Collect all loadsheet result objects from the current filtered set.
  const entries = [];
  for (const idx of filteredIdx) {
    const r = rows[idx];
    const ls = extractLoadsheetResult(r);
    if (!ls) continue;
    entries.push({ ls, r });
  }

  if (!entries.length) {
    overlay.style.display = 'none';
    return;
  }

  // Determine the display label for a row: prefer flight number, fall back to tail.
  function rowLabel(e) {
    return String(e.ls.flight || e.r.flight || e.ls.tail || e.r.tail || '?').trim();
  }

  // Return a new array keeping only the first occurrence of each flight label.
  // The caller is responsible for sorting the input before calling this so that
  // the "best" entry for each flight is the one that survives.
  function dedupeByLabel(arr) {
    const seen = new Set();
    return arr.filter(e => {
      const key = rowLabel(e);
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });
  }

  // Format weight as tonnes with one decimal place (e.g. 65432 kg → "65.4 t").
  function fmtTonnes(kg) {
    if (!kg || kg <= 0) return '\u2014';
    return (kg / 1000).toFixed(1) + '\u202ft';
  }

  // Build a single display column as HTML.  Rows are not clickable (no coordinates).
  function lsCol(title, colEntries, valueFn) {
    if (!colEntries.length) return '';
    let html = `<div class="pwi-stat-col"><div class="meteo-stat-heading">${title}</div>`;
    for (const e of colEntries) {
      html += `<div class="meteo-stat-row" style="cursor:default">` +
              `<span class="meteo-stat-val">${valueFn(e)}</span>` +
              `<span class="meteo-stat-tail">${escapeHtml(rowLabel(e))}</span>` +
              '</div>';
    }
    html += '</div>';
    return html;
  }

  const withPAX = entries.filter(e => e.ls.pax > 0);
  const withTOW = entries.filter(e => e.ls.tow > 0);
  const withTOF = entries.filter(e => e.ls.tof > 0);

  // Load factor score: passengers per tonne of trip fuel.
  // A higher ratio means more passengers are carried for each tonne of fuel
  // burned — i.e. the flight is commercially efficient.  A lower ratio means
  // the aircraft is carrying little payload relative to its fuel burn.
  // Only entries with both PAX and TIF available participate.
  const withScore = entries.filter(e => e.ls.pax > 0 && e.ls.tif > 0);
  function loadScore(e) { return e.ls.pax / (e.ls.tif / 1000); }
  function fmtScore(e)  { return loadScore(e).toFixed(1) + '\u202fpax/t'; }

  const maxPAX    = dedupeByLabel([...withPAX].sort((a, b) => b.ls.pax - a.ls.pax)).slice(0, LS_TOP_N);
  const minPAX    = dedupeByLabel([...withPAX].sort((a, b) => a.ls.pax - b.ls.pax)).slice(0, LS_TOP_N);
  const maxTOW    = dedupeByLabel([...withTOW].sort((a, b) => b.ls.tow - a.ls.tow)).slice(0, LS_TOP_N);
  const maxTOF    = dedupeByLabel([...withTOF].sort((a, b) => b.ls.tof - a.ls.tof)).slice(0, LS_TOP_N);
  // Best load factor: highest PAX-per-tonne-of-fuel score.
  const goodFlights = dedupeByLabel([...withScore].sort((a, b) => loadScore(b) - loadScore(a))).slice(0, LS_TOP_N);
  // Worst load factor: lowest PAX-per-tonne-of-fuel score.
  // Entries that already appear in goodFlights are excluded so that a single
  // flight cannot show up in both columns simultaneously.
  const _goodSet = new Set(goodFlights);
  const badFlights = dedupeByLabel(
    [...withScore]
      .sort((a, b) => loadScore(a) - loadScore(b))
      .filter(e => !_goodSet.has(e))
  ).slice(0, LS_TOP_N);

  overlay.innerHTML =
    lsCol('Max PAX', maxPAX, e => String(e.ls.pax)) +
    lsCol('Min PAX', minPAX, e => String(e.ls.pax)) +
    lsCol('Max TOW', maxTOW, e => fmtTonnes(e.ls.tow)) +
    lsCol('Max TOF', maxTOF, e => fmtTonnes(e.ls.tof)) +
    lsCol('<span style="color:#4ade80">\u2714 GOOD load factor</span>', goodFlights, fmtScore) +
    lsCol('<span style="color:#f87171">\u2716 BAD load factor</span>',  badFlights,  fmtScore);

  overlay.style.display = 'flex';
}

// =============================================================================
// buildPWIStatsControl creates a Leaflet control (positioned at bottom-right) showing
// five columns of route wind statistics collected from all PWI waypoints on the map:
//   1. Coldest temperature   (per waypoint — min across all flight levels)
//   2. Warmest temperature   (per waypoint — max across all flight levels)
//   3. Fastest wind          (per waypoint — max across all flight levels, in km/h)
//   4. Coldest flight level  (per FL — the FL with the overall minimum temperature)
//   5. Windiest flight level (per FL — the FL with the overall maximum wind speed)
// The first three columns can also be filtered to a specific FL via the drop-down.
// Rows in columns 1-3 are clickable and fly the map to the waypoint's location.
// Returns null when no route wind data is available.
function buildPWIStatsControl(waypointEntries, flEntries) {
  const withTemp = waypointEntries.filter(p => p.minTemp !== null || p.maxTemp !== null);
  const withWind = waypointEntries.filter(p => p.maxWind !== null || p.minWind !== null);
  if (!withTemp.length && !withWind.length) return null;

  const TOP_N = 6;
  const coldestFL  = [...flEntries].filter(f => f.minTemp !== null)
    .sort((a, b) => a.minTemp - b.minTemp).slice(0, TOP_N);
  const windiestFL = [...flEntries].filter(f => f.maxWind !== null)
    .sort((a, b) => b.maxWind - a.maxWind).slice(0, TOP_N);
  const availableFlightLevels = [...new Set(
    waypointEntries.flatMap(p => [...(p.flStats instanceof Map ? p.flStats.keys() : [])])
      .filter(fl => Number.isFinite(fl) && fl > 0)
  )].sort((a, b) => a - b);

  function fmtTemp(v) {
    const r = Math.round(v);
    return (r >= 0 ? '+' : '') + r + '\u00b0C';
  }
  // Wind speed stored in knots — display in km/h for consistency with the rest of the UI.
  function fmtWindKts(kts) {
    return Math.round(kts * 1.852) + '\u202fkm/h';
  }
  function fmtFL(fl) {
    return 'FL\u202f' + Math.round(fl);
  }

  function getWaypointRows(selectedFlightLevel) {
    if (!Number.isFinite(selectedFlightLevel)) {
      return {
        coldest: [...withTemp].filter(p => p.minTemp !== null)
          .sort((a, b) => a.minTemp - b.minTemp).slice(0, TOP_N),
        warmest: [...withTemp].filter(p => p.maxTemp !== null)
          .sort((a, b) => b.maxTemp - a.maxTemp).slice(0, TOP_N),
        fastest: [...withWind].filter(p => p.maxWind !== null)
          .sort((a, b) => b.maxWind - a.maxWind).slice(0, TOP_N)
      };
    }

    const filtered = waypointEntries.map(p => {
      const flStat = p.flStats instanceof Map ? p.flStats.get(selectedFlightLevel) : null;
      if (!flStat) return null;
      return {
        name: p.name,
        latlng: p.latlng,
        minTemp: flStat.minTemp,
        maxTemp: flStat.maxTemp,
        maxWind: flStat.maxWind,
        minWind: flStat.minWind,
        marker: flStat.marker || p.marker,
        markerForMinTemp: flStat.markerForMinTemp || flStat.marker || p.marker,
        markerForMaxTemp: flStat.markerForMaxTemp || flStat.marker || p.marker,
        markerForMaxWind: flStat.markerForMaxWind || flStat.marker || p.marker,
      };
    }).filter(Boolean);

    return {
      coldest: filtered.filter(p => p.minTemp !== null)
        .sort((a, b) => a.minTemp - b.minTemp).slice(0, TOP_N),
      warmest: filtered.filter(p => p.maxTemp !== null)
        .sort((a, b) => b.maxTemp - a.maxTemp).slice(0, TOP_N),
      fastest: filtered.filter(p => p.maxWind !== null)
        .sort((a, b) => b.maxWind - a.maxWind).slice(0, TOP_N)
    };
  }

  // colPoints maps column index (0-3) to the sorted waypoint entry array so
  // the click handler can resolve the correct entry via [colIdx][rowIdx].
  let colPoints = [[], [], []];

  // Renders a column whose rows each represent a waypoint (clickable, flies to point).
  function wpColHtml(title, rows, valueFn, colIdx) {
    if (!rows.length) return '';
    let html = `<div class="pwi-stat-col"><div class="meteo-stat-heading">${title}</div>`;
    for (let i = 0; i < rows.length; i++) {
      const p = rows[i];
      html += `<div class="meteo-stat-row" data-pwicol="${colIdx}" data-pwirow="${i}" title="${escapeHtml(p.name || '?')}">` +
              `<span class="meteo-stat-val">${valueFn(p)}</span>` +
              `<span class="meteo-stat-tail">${escapeHtml(p.name || '?')}</span>` +
              '</div>';
    }
    html += '</div>';
    return html;
  }

  // Renders a column whose rows each represent a flight level (not clickable).
  function flColHtml(title, rows, valueFn) {
    if (!rows.length) return '';
    let html = `<div class="pwi-stat-col"><div class="meteo-stat-heading">${title}</div>`;
    for (const f of rows) {
      html += `<div class="meteo-stat-row">` +
              `<span class="meteo-stat-val">${valueFn(f)}</span>` +
              `<span class="meteo-stat-tail">${fmtFL(f.fl)}</span>` +
              '</div>';
    }
    html += '</div>';
    return html;
  }

  const ctrl = L.control({ position: 'bottomright' });
  ctrl.onAdd = function() {
    const div = L.DomUtil.create('div', 'pwi-stats-panel');
    const header = L.DomUtil.create('div', 'pwi-stats-header', div);
    let select = null;
    if (availableFlightLevels.length) {
      const filterLabel = L.DomUtil.create('label', 'pwi-stats-filter', header);
      filterLabel.appendChild(document.createTextNode('Prika\u017ei FL'));
      select = L.DomUtil.create('select', 'pwi-stats-select', filterLabel);
      select.add(new Option('Svi FL', ''));
      for (const fl of availableFlightLevels) {
        select.add(new Option(fmtFL(fl), String(Math.round(fl))));
      }
      const initialValue = availableFlightLevels.some(fl => String(Math.round(fl)) === String(pwiSelectedFlightLevel))
        ? String(pwiSelectedFlightLevel)
        : '';
      select.value = initialValue;
      pwiSelectedFlightLevel = initialValue;
    }
    const grid = L.DomUtil.create('div', 'pwi-stats-grid', div);

    function renderGrid() {
      const selectedFlightLevel = select && select.value !== '' ? coerceNum(select.value) : null;
      const waypointRows = getWaypointRows(selectedFlightLevel);
      colPoints = [waypointRows.coldest, waypointRows.warmest, waypointRows.fastest];
      const flSuffix = Number.isFinite(selectedFlightLevel) ? ` (${fmtFL(selectedFlightLevel)})` : '';
      grid.innerHTML =
        wpColHtml(`Najhladnije${flSuffix}`,         waypointRows.coldest, p => fmtTemp(p.minTemp),     0) +
        wpColHtml(`Najtoplije${flSuffix}`,          waypointRows.warmest, p => fmtTemp(p.maxTemp),     1) +
        wpColHtml(`Najja\u010di vetar${flSuffix}`, waypointRows.fastest, p => fmtWindKts(p.maxWind), 2) +
        flColHtml('Najhladniji FL',     coldestFL,  f => fmtTemp(f.minTemp)) +
        flColHtml('Najvjetrovitiji FL', windiestFL, f => fmtWindKts(f.maxWind));
    }

    renderGrid();
    if (!colPoints[0].length && !colPoints[1].length && !colPoints[2].length && !coldestFL.length && !windiestFL.length) {
      return null;
    }

    if (select) {
      select.addEventListener('change', function() {
        pwiSelectedFlightLevel = select.value;
        renderGrid();
      });
    }
    L.DomEvent.disableScrollPropagation(div);
    L.DomEvent.disableClickPropagation(div);
    div.addEventListener('click', function(e) {
      const row = e.target.closest('[data-pwicol]');
      if (!row) return;
      try {
        const colIdx = parseInt(row.dataset.pwicol, 10);
        const rowIdx = parseInt(row.dataset.pwirow, 10);
        const p = colPoints[colIdx]?.[rowIdx];
        if (!p || !p.latlng) return;
        const popupMarker = colIdx === 0
          ? (p.markerForMinTemp || p.marker)
          : colIdx === 1
            ? (p.markerForMaxTemp || p.marker)
            : colIdx === 2
              ? (p.markerForMaxWind || p.marker)
              : p.marker;
        map.flyTo(p.latlng, Math.max(map.getZoom(), 6), { animate: true, duration: 0.8 });
        if (popupMarker) map.once('moveend', () => popupMarker.openPopup());
      } catch (_) {}
    });
    return div;
  };
  return ctrl;
}

function rowHasParsedRoute(r) {
  const results = Array.isArray(r?.raw?.results) ? r.raw.results : [];
  for (const result of results) {
    if (typeof result !== 'object' || !result) continue;

    // Flat route string — present in most non-CPDLC parsers.
    if (typeof result.route === 'string' && result.route.trim()) return true;

    // MIAM REP/RTR: origin and destination extracted from the inner message.
    if (typeof result.origin_icao === 'string' && result.origin_icao.trim()) return true;

    // Waypoint array — H1, label10.
    if (Array.isArray(result.waypoints) && result.waypoints.length > 0) return true;

    // Route waypoints array — PDC.
    if (Array.isArray(result.route_waypoints) && result.route_waypoints.length > 0) return true;

    // CPDLC route clearance embedded in message elements.
    const elements = Array.isArray(result.elements) ? result.elements : [];
    for (const elem of elements) {
      const data = elem?.data;
      if (!data || typeof data !== 'object') continue;
      // Shape 1: direct RouteClearance serialised as the element data.
      if (Array.isArray(data.route_information) && data.route_information.length > 0) return true;
      // Shape 2: combined position+route map — route_clearance is nested.
      if (Array.isArray(data.route_clearance?.route_information) && data.route_clearance.route_information.length > 0) return true;
    }
  }
  return false;
}

function extractRouteSyncOverride(obj){
  if (!obj || typeof obj !== 'object') return null;

  const candidates = [
    obj.route_sync_override,
    obj.routeSyncOverride,
    obj.raw && typeof obj.raw === 'object' ? obj.raw.route_sync_override : null,
    obj.raw && typeof obj.raw === 'object' ? obj.raw.routeSyncOverride : null,
  ];

  for (const candidate of candidates){
    if (!candidate || typeof candidate !== 'object') continue;
    const pair = extractAirportPair(candidate.origin, candidate.destination) || parseICAORoutePair(candidate.route);
    if (pair) {
      return {
        origin: pair.origin,
        destination: pair.destination,
        route: `${pair.origin}-${pair.destination}`,
      };
    }
  }

  return null;
}

function isValidICAOCode(value){
  return typeof value === 'string' && /^[A-Z]{4}$/.test(value.trim().toUpperCase());
}

function normaliseICAOCode(value){
  if (typeof value !== 'string') return '';
  const code = value.trim().toUpperCase();
  return isValidICAOCode(code) ? code : '';
}

function parseICAORoutePair(value){
  if (typeof value !== 'string') return null;
  const match = value.trim().toUpperCase().match(/^([A-Z]{4})-([A-Z]{4})$/);
  if (!match) return null;
  return { origin: match[1], destination: match[2] };
}

function parseICAORouteCodes(value){
  if (typeof value !== 'string') return [];
  const trimmed = value.trim().toUpperCase();
  if (!trimmed) return [];

  const codes = trimmed.split('-').map((part) => part.trim()).filter(Boolean);
  if (codes.length < 2) return [];
  if (!codes.every((code) => /^[A-Z]{4}$/.test(code))) return [];
  return codes;
}

function extractAirportPair(originValue, destinationValue){
  const origin = normaliseICAOCode(originValue);
  const destination = normaliseICAOCode(destinationValue);
  if (!origin || !destination) return null;
  return { origin, destination };
}

function extractAirportPairFromObject(obj, originKeys, destinationKeys){
  if (!obj || typeof obj !== 'object') return null;

  for (const originKey of originKeys){
    for (const destinationKey of destinationKeys){
      const pair = extractAirportPair(obj[originKey], obj[destinationKey]);
      if (pair) return pair;
    }
  }

  return null;
}

function extractParsedRoutePair(obj){
  if (!obj || typeof obj !== 'object') return null;

  const overridePair = extractRouteSyncOverride(obj);
  if (overridePair) return overridePair;

  const messageObj = obj.message && typeof obj.message === 'object' ? obj.message : null;
  const messagePair = extractAirportPairFromObject(messageObj, ['origin', 'origin_icao', 'departing_airport'], ['destination', 'destination_airport', 'dest_icao']);
  if (messagePair) return messagePair;

  const messageRoutePair = messageObj ? parseICAORoutePair(messageObj.route) : null;
  if (messageRoutePair) return messageRoutePair;

  const directPair = extractAirportPairFromObject(obj, ['origin', 'origin_icao'], ['destination', 'dest_icao']);
  if (directPair) return directPair;

  let fallbackRoutePair = parseICAORoutePair(obj.route);
  const results = Array.isArray(obj.results) ? obj.results : [];
  for (const result of results){
    if (!result || typeof result !== 'object') continue;

    const resultPair = extractAirportPairFromObject(result, ['origin', 'origin_icao'], ['destination', 'dest_icao']);
    if (resultPair) return resultPair;

    if (!fallbackRoutePair) {
      fallbackRoutePair = parseICAORoutePair(result.route);
    }
  }

  return fallbackRoutePair;
}

function getRouteDisplayState(row){
  const routeLookup = row?.routeLookup || extractRouteLookup(row?.raw || row) || null;
  const routeValue = String(routeLookup?.route || '').trim();
  const routeUpdatedAt = String(routeLookup?.updatetime || '').trim();
  const lookupPair = parseICAORoutePair(routeValue);
  const parsedPair = extractParsedRoutePair(row?.raw || row);
  const parsedRouteValue = parsedPair ? `${parsedPair.origin}-${parsedPair.destination}` : '';
  const primaryRouteValue = routeValue || parsedRouteValue;
  const routeCodes = parseICAORouteCodes(primaryRouteValue);
  const hasComparableRoute = !!(lookupPair && parsedPair);
  const routeMismatch = hasComparableRoute && (
    lookupPair.origin !== parsedPair.origin ||
    lookupPair.destination !== parsedPair.destination
  );
  const showAirportLegNames = !!routeValue;

  return {
    routeValue,
    routeUpdatedAt,
    lookupPair,
    parsedPair,
    parsedRouteValue,
    airportLegNames: showAirportLegNames ? routeCodes.map((code) => sanitiseAirportDisplayName(getAirportNameByCode(code))).filter(Boolean) : [],
    primaryRouteValue,
    primaryRouteSource: routeValue ? 'saved' : (parsedRouteValue ? 'parsed' : ''),
    routeMismatch,
    isUnixLikeUpdateTime: routeUpdatedAt.startsWith('1')
  };
}

function extractLogDate(row){
  const candidates = [
    row?.timestamp,
    row?.raw?.timestamp,
    row?.raw?.message?.timestamp,
  ];

  for (const candidate of candidates){
    let trimmed = '';
    if (typeof candidate === 'string') {
      trimmed = candidate.trim();
    } else if (typeof candidate === 'number' && Number.isFinite(candidate)) {
      trimmed = String(candidate);
    }
    if (!trimmed) continue;

    const directMatch = trimmed.match(/^(\d{4}-\d{2}-\d{2})/);
    if (directMatch) return directMatch[1];

    const unixMatch = trimmed.match(/^\d+(?:\.\d+)?$/);
    if (unixMatch) {
      const numeric = Number(trimmed);
      if (Number.isFinite(numeric)) {
        const millis = numeric > 1e12 ? numeric : numeric * 1000;
        const parsedUnix = new Date(millis);
        if (!Number.isNaN(parsedUnix.getTime())) {
          return parsedUnix.toISOString().slice(0, 10);
        }
      }
    }

    const parsed = new Date(trimmed);
    if (!Number.isNaN(parsed.getTime())) {
      return parsed.toISOString().slice(0, 10);
    }
  }

  return '';
}

function buildRouteSavePayload(row){
  const flight = getFlightLookupKeyForRow(row);
  const pair = extractParsedRoutePair(row?.raw || row);
  const updateTime = extractLogDate(row);
  if (!flight || !pair || !updateTime) return null;
  return {
    flight,
    route: `${pair.origin}-${pair.destination}`,
    updatetime: updateTime,
  };
}

function applyRouteRecordToRow(row, record){
  if (!row || typeof row !== 'object') return;

  const lookup = record && typeof record === 'object'
    ? {
        route: String(record.route || '').trim(),
        updatetime: String(record.updatetime || '').trim(),
      }
    : null;
  const hasLookup = lookup && (lookup.route || lookup.updatetime);
  const overridePair = hasLookup ? parseICAORoutePair(lookup.route) : null;
  const override = overridePair
    ? { origin: overridePair.origin, destination: overridePair.destination, route: `${overridePair.origin}-${overridePair.destination}` }
    : null;

  row.routeLookup = hasLookup ? lookup : null;
  row.routeSyncOverride = override;

  if (row.raw && typeof row.raw === 'object'){
    row.raw.routeLookup = row.routeLookup;
    row.raw.route_lookup = row.routeLookup;
    row.raw.routeSyncOverride = override;
    row.raw.route_sync_override = override;
  }
}

function applyRouteRecordToFlightRows(flightKey, record){
  let updated = 0;
  for (const row of rows){
    if (getFlightLookupKeyForRow(row) !== flightKey) continue;
    applyRouteRecordToRow(row, record);
    updated += 1;
  }
  return updated;
}

async function fetchRouteRecord(flightKey){
  const response = await fetch(`${getRouteAPIBase()}/api/flightroute?flight=${encodeURIComponent(flightKey)}`);
  if (response.status === 404) return null;
  if (!response.ok) {
    const text = await response.text();
    throw new Error(text || `HTTP ${response.status}`);
  }
  return response.json();
}

async function refreshRouteForRow(row){
  const flightKey = getFlightLookupKeyForRow(row);
  if (!flightKey) {
    alert('Nema flight ključa za route refresh.');
    return;
  }

  setRouteAPIStatus(`Route API: refresh ${flightKey}...`, false);
  const record = await fetchRouteRecord(flightKey);
  const updated = applyRouteRecordToFlightRows(flightKey, record);
  recomputeFilterAndRender();

  if (record) {
    setRouteAPIStatus(`Route API: refreshed ${flightKey} on ${updated} row(s) • ${String(routeAPIConfig?.db_path || '').trim() || getRouteAPIBase()}`, false);
  } else {
    setRouteAPIStatus(`Route API: no saved route for ${flightKey} • ${String(routeAPIConfig?.db_path || '').trim() || getRouteAPIBase()}`, false);
  }
}

async function saveRouteForRow(row){
  const payload = buildRouteSavePayload(row);
  if (!payload) {
    alert('Za upis su potrebni flight, parsirani origin/destination i datum loga.');
    return;
  }

  setRouteAPIStatus(`Route API: saving ${payload.flight} ${payload.route}...`, false);
  const response = await fetch(`${getRouteAPIBase()}/api/flightroute`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });
  if (!response.ok) {
    const text = await response.text();
    throw new Error(text || `HTTP ${response.status}`);
  }

  const record = await response.json();
  const updated = applyRouteRecordToFlightRows(payload.flight, record);
  recomputeFilterAndRender();
  setRouteAPIStatus(`Route API: saved ${payload.route} for ${payload.flight} on ${updated} row(s) • ${String(routeAPIConfig?.db_path || '').trim() || getRouteAPIBase()}`, false);
}

function escapeHtml(s){
  return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;');
}

function uniq(arr){ return [...new Set(arr)].sort(); }

function sortValueText(value){
  if (value === null || value === undefined) return '';
  return String(value).trim();
}

function compareSortText(left, right){
  const a = sortValueText(left);
  const b = sortValueText(right);

  const aEmpty = a === '';
  const bEmpty = b === '';
  if (aEmpty && bEmpty) return 0;
  if (aEmpty) return 1;
  if (bEmpty) return -1;

  return a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' });
}

function compareSortNumber(left, right){
  const a = Number.isFinite(left) ? left : -1;
  const b = Number.isFinite(right) ? right : -1;
  if (a === b) return 0;
  return a < b ? -1 : 1;
}

function getRowTimestampSortValue(row){
  if (!row || typeof row !== 'object') return -1;

  const candidates = [
    row.timestamp,
    row?.raw?.timestamp,
    row?.raw?.message?.timestamp
  ];

  for (const candidate of candidates){
    if (candidate === null || candidate === undefined || candidate === '') continue;
    if (typeof candidate === 'number' && Number.isFinite(candidate)) {
      return candidate;
    }
    if (typeof candidate === 'string') {
      const numeric = candidate.trim();
      if (/^-?\d+(?:\.\d+)?$/.test(numeric)) {
        const value = Number(numeric);
        if (Number.isFinite(value)) return value;
      }
      const parsed = Date.parse(candidate);
      if (!Number.isNaN(parsed)) return parsed;
    }
  }

  return -1;
}

function getRowMessageDataAmount(row){
  if (!row || typeof row !== 'object') return 0;

  const rawText = String(
    row?.raw?.message?.text ??
    row?.raw?.message?.msg_text ??
    row?.raw?.text ??
    row?.raw?.msg_text ??
    ''
  );
  if (rawText.trim()) return rawText.length;

  try {
    const rawJson = JSON.stringify(row.raw ?? row);
    if (typeof rawJson === 'string' && rawJson.length) return rawJson.length;
  } catch (err) {
    // Ignore serialisation failures and fall back to summary length.
  }

  return String(row.summary || '').length;
}

function applySort(){
  if (!sortState.key) return;

  const dir = sortState.dir === 'desc' ? -1 : 1;
  filteredIdx.sort((leftIdx, rightIdx) => {
    const left = rows[leftIdx];
    const right = rows[rightIdx];

    let cmp = 0;
    if (sortState.key === 'timestamp'){
      cmp = compareSortNumber(getRowTimestampSortValue(left), getRowTimestampSortValue(right));
    } else if (sortState.key === 'tail'){
      cmp = compareSortText(left && left.tail, right && right.tail);
    } else if (sortState.key === 'flight'){
      cmp = compareSortText(getFlightDisplayForRow(left), getFlightDisplayForRow(right));
    } else if (sortState.key === 'details'){
      cmp = compareSortNumber(getRowMessageDataAmount(left), getRowMessageDataAmount(right));
    }

    if (cmp !== 0) return cmp * dir;
    return leftIdx - rightIdx;
  });
}

function updateSortHeaders(){
  const headers = [
    { id: 'thTimestamp', key: 'timestamp' },
    { id: 'thTail', key: 'tail' },
    { id: 'thFlight', key: 'flight' },
    { id: 'thDetails', key: 'details' }
  ];

  for (const header of headers){
    const el = document.getElementById(header.id);
    if (!el) continue;

    const indicator = el.querySelector('.sort-indicator');
    if (!indicator) continue;

    if (sortState.key !== header.key){
      indicator.textContent = '';
      el.setAttribute('aria-sort', 'none');
      continue;
    }

    indicator.textContent = sortState.dir === 'desc' ? '▼' : '▲';
    el.setAttribute('aria-sort', sortState.dir === 'desc' ? 'descending' : 'ascending');
  }
}

function toggleSort(key){
  if (sortState.key === key){
    sortState.dir = sortState.dir === 'asc' ? 'desc' : 'asc';
  } else {
    sortState.key = key;
    sortState.dir = 'asc';
  }

  page = 0;
  recomputeFilterAndRender();
}

function scheduleHeavy(fn){
  if ('requestIdleCallback' in window){
    requestIdleCallback(() => fn(), {timeout: 1000});
  } else {
    setTimeout(fn, 0);
  }
}

function formatTimestamp(ts){
  if (ts === null || ts === undefined || ts === '') return '';

  const toDisplayTimestamp = (date) => {
    return date.toISOString().replace(/\.\d{3}Z$/, 'Z').replace('T',' ').replace('Z',' UTC');
  };

  // ISO string?
  if (typeof ts === 'string'){
    const d = new Date(ts);
    if (!isNaN(d.getTime())){
      return toDisplayTimestamp(d);
    }
    // numeric string?
    const s = ts.trim();
    if (/^-?\d+(?:\.\d+)?$/.test(s)){
      ts = Number(s);
    } else {
      return ts;
    }
  }
  if (typeof ts === 'number' && isFinite(ts)){
    let ms = ts;
    if (ts < 1e12) ms = ts * 1000;
    else if (ts >= 1e14 && ts < 1e17) ms = ts / 1000;
    else if (ts >= 1e17) ms = ts / 1e6;
    const d = new Date(ms);
    if (!isNaN(d.getTime())){
      return toDisplayTimestamp(d);
    }
  }
  return String(ts);
}

/* ---- Parsed-details rendering WITHOUT braces/quotes ----
   Instead of nesting tables (which can look "razvučeno" and cause huge whitespace),
   we FLATTEN the object into key paths, then render a 2-column table.
*/
function isPlainObject(x){
  return x && typeof x === 'object' && !Array.isArray(x);
}

function fmtScalar(v){
  if (v === null) return 'null';
  if (v === undefined) return 'undefined';
  const t = typeof v;
  if (t === 'string') return v;
  if (t === 'number' || t === 'boolean') return String(v);
  return String(v);
}

function flattenPairs(obj, prefix, out, depth){
  const maxDepth = 8;
  if (depth > maxDepth){
    out.push([prefix || '(root)', '{…}']);
    return;
  }

  if (obj === null || obj === undefined){
    out.push([prefix || '(root)', fmtScalar(obj)]);
    return;
  }

  if (typeof obj === 'string' || typeof obj === 'number' || typeof obj === 'boolean'){
    out.push([prefix || '(root)', fmtScalar(obj)]);
    return;
  }

  if (Array.isArray(obj)){
    if (!obj.length){
      out.push([prefix || '(root)', '(empty array)']);
      return;
    }
    const allPrim = obj.every(x => x === null || ['string','number','boolean'].includes(typeof x));
    if (allPrim){
      out.push([prefix || '(root)', obj.map(x => fmtScalar(x)).join(', ')]);
      return;
    }
    for (let i=0; i<obj.length; i++){
      let pfx = `${prefix}[${i}]`;
      if (pfx === 'results[0]') pfx = 'results';
      if (pfx.startsWith('results[0].')) pfx = pfx.slice('results[0].'.length);
      flattenPairs(obj[i], pfx, out, depth+1);
    }
    return;
  }

  if (isPlainObject(obj)){
    const keys = Object.keys(obj).sort((a,b)=>a.localeCompare(b));
    if (!keys.length){
      out.push([prefix || '(root)', '(empty object)']);
      return;
    }
    for (const k of keys){
      const v = obj[k];
      const p = prefix ? `${prefix}.${k}` : k;
      // Hide 'message' section entirely (already shown in list / header)
      if (p === 'message' || p.startsWith('message.')) {
        continue;
      }

      // Remove noisy 'results[0].' prefix for single-item results
      let p2 = p;
      if (p2 === 'results[0]') p2 = 'results';
      if (p2.startsWith('results[0].')) {
        p2 = p2.slice('results[0].'.length);
      }
      // Hide 'results' header line
      if (p2 === 'results') {
        // still descend into results object/array below, but don't show the header row
      }
      // Also drop 'results.' prefix (we want plain field names)
      if (p2.startsWith('results.')) {
        p2 = p2.slice('results.'.length);
      }
      if (v === null || v === undefined || typeof v === 'string' || typeof v === 'number' || typeof v === 'boolean'){
        if (p2 !== 'results') out.push([p2, fmtScalar(v)]);
      } else if (Array.isArray(v) && v.length && v.every(x => x === null || ['string','number','boolean'].includes(typeof x))){
        if (p2 !== 'results') out.push([p2, v.map(x => fmtScalar(x)).join(', ')]);
      } else {
        // mark object/array header then descend (gives better readability)
        if (p2 !== 'results') out.push([p2, Array.isArray(v) ? `[${v.length} items]` : '{…}']);
        flattenPairs(v, p2, out, depth+1);
      }
    }
    return;
  }

  // fallback
  out.push([prefix || '(root)', fmtScalar(obj)]);
}

function renderDetailsObject(obj){
  const pairs = [];
  flattenPairs(obj, '', pairs, 0);

  // Compute a good key-column width based on the longest rendered key.
  // This keeps values close to keys without truncating keys.
  const baseFont = '13px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif';
  const canvas = renderDetailsObject._c || (renderDetailsObject._c = document.createElement('canvas'));
  const ctx = canvas.getContext('2d');
  ctx.font = baseFont;

  let maxW = 0;
  // Use modest indent for nesting, but don't push values too far right
  for (const [k,_v] of pairs){
    const depth = (k.match(/\./g) || []).length + (k.match(/\[/g) || []).length;
    const pad = Math.min(8*depth, 24); // px
    const w = ctx.measureText(k).width + pad;
    if (w > maxW) maxW = w;
  }
  // Clamp to sensible bounds
  const keyW = Math.max(180, Math.min(Math.ceil(maxW) + 16, 420));

  let html = `<div class="kvbox" style="--keyw:${keyW}px"><div class="kvrows">`;
  for (let [k,v] of pairs){
    // Wind speed conversion to km/h
    if (typeof v === 'string' && (k.endsWith('wind_speed_kts') || k.endsWith('wind_speed'))){
      const n = coerceNum(v);
      if (isNum(n)){
        const kmh = n * 1.852;
        // Keep original unit hint
        if (k.endsWith('wind_speed_kts')) v = `${n} kts (${kmh.toFixed(1)} km/h)`;
        else v = `${n} (${kmh.toFixed(1)} km/h)`;
      }
    } else if (typeof v === 'number' && (k.endsWith('wind_speed_kts') || k.endsWith('wind_speed'))){
      const kmh = v * 1.852;
      if (k.endsWith('wind_speed_kts')) v = `${v} kts (${kmh.toFixed(1)} km/h)`;
      else v = `${v} (${kmh.toFixed(1)} km/h)`;
    }
  
    const depth = (k.match(/\./g) || []).length + (k.match(/\[/g) || []).length;
    const pad = Math.min(10*depth, 30);
    const kEsc = escapeHtml(k);
    const vEsc = escapeHtml(v);
    html += `<div class="kvrow"><div class="kvk" title="${kEsc}" style="padding-left:${pad}px">${kEsc}</div><div class="kvv">${vEsc}</div></div>`;
  }
  html += '</div></div>';
  return html;
}

/* ---- Input formats supported ----
   1) Raw extractor output: [{message:{...}, results:[...]}]
   2) Viewer rows: [{timestamp, tail, label, type, lat, lon, raw, ...}]
   3) Parsed list like your example: [{timestamp, registration, message_type, latitude, longitude, ...}]
*/
function normalizeInput(parsed){
  if (!Array.isArray(parsed)) return [];

  // Case 1: raw extractor output (results optional)
  if (parsed.length && parsed[0] && parsed[0].message){
    return parsed.map((it) => {
      const msg = it.message || {};
      const res = it.results || [];
      const found = (Array.isArray(res) ? res.find(x => x && (x.message_type || x.msg_type || x.hfnpdu_type)) : null) || {};
      const inferredType = inferResultType(found, msg.label);
      const typ =
        inferredType ||
        (Array.isArray(res) && res.some(x => x && x.current_link) ? "link_mgmt" :
          (Array.isArray(res) && res.some(x => x && x.latitude !== undefined && x.longitude !== undefined) ? "pos_report" : "unknown"));

      // Attempt to find coords in any result entry too
      let lat = null, lon = null;
      for (const r of (Array.isArray(res) ? res : [])){
        if (r && typeof r === 'object' && r.latitude !== undefined && r.longitude !== undefined){
          lat = coerceNum(r.latitude);
          lon = coerceNum(r.longitude);
          break;
        }
      }
      const rawObj = { message: msg, results: res };
      if (!isNum(lat) || !isNum(lon)){
        const c = extractCoords(rawObj);
        if (c){ lat = c.lat; lon = c.lon; }
      }
      return {
        timestamp: msg.timestamp ?? "",
        manufacturerModel: msg.manufacturer_model ?? msg.manufacturerModel ?? msg.airframe?.manufacturer_model ?? msg.airframe?.manufacturerModel ?? "",
        tail: msg.tail || msg.reg || msg.registration || "",
        flight: extractFlightDisplay(rawObj),
        routeLookup: extractRouteLookup(it) || extractRouteLookup(rawObj),
        label: String(msg.label || ""),
        type: String(typ || "unknown"),
        lat: lat,
        lon: lon,
        summary: buildHFDLSummary(rawObj) || (msg.text || ""),
        raw: rawObj
      };
    });
  }

  // Case 3: parsed list like your example (has message_id + registration + latitude/longitude)
  if (parsed.length && parsed[0] && typeof parsed[0] === 'object' &&
      (('message_id' in parsed[0]) || ('registration' in parsed[0])) &&
      (('latitude' in parsed[0]) || ('longitude' in parsed[0]) || ('message_type' in parsed[0])) ){
    return parsed.map((o) => {
      const lat = coerceNum(o.latitude !== undefined ? o.latitude : (o.lat !== undefined ? o.lat : null));
      const lon = coerceNum(o.longitude !== undefined ? o.longitude : (o.lon !== undefined ? o.lon : null));
      const reg = o.registration || o.tail || "";
      const typ = o.message_type || o.type || "parsed";
      const lbl = o.label || (typ === 'hfdl_data' ? 'HFDL' : '');
      const summaryParts = [];
      if (o.adsc_flight_id) summaryParts.push(`FID ${o.adsc_flight_id}`);
      if (o.ground_station) summaryParts.push(`GS ${o.ground_station}`);
      if (o.payload_bytes !== undefined) summaryParts.push(`bytes ${o.payload_bytes}`);
      let lat2 = lat, lon2 = lon;
      if (!isNum(lat2) || !isNum(lon2)){
        const c = extractCoords(o);
        if (c){ lat2 = c.lat; lon2 = c.lon; }
      }
      return {
        timestamp: o.timestamp ?? "",
        manufacturerModel: o.manufacturer_model ?? o.manufacturerModel ?? o.airframe?.manufacturer_model ?? o.airframe?.manufacturerModel ?? o.message?.airframe?.manufacturer_model ?? o.message?.airframe?.manufacturerModel ?? "",
        tail: reg,
        flight: extractFlightDisplay(o),
        routeLookup: extractRouteLookup(o),
        label: String(lbl || ""),
        type: String(typ || "parsed"),
        lat: lat2,
        lon: lon2,
        summary: buildHFDLSummary(o) || summaryParts.join(" • "),
        raw: o
      };
    });
  }

  // Case 2: already rows (try best effort)
  return parsed.map((o) => {
    let lat = coerceNum((o.lat ?? o.latitude ?? null));
    let lon = coerceNum((o.lon ?? o.longitude ?? null));
    if (!isNum(lat) || !isNum(lon)){
      const c = extractCoords(o.raw || o);
      if (c){ lat = c.lat; lon = c.lon; }
    }
    return {
      timestamp: o.timestamp ?? "",
      manufacturerModel: o.manufacturerModel ?? o.manufacturer_model ?? o.airframe?.manufacturer_model ?? o.airframe?.manufacturerModel ?? o.message?.airframe?.manufacturer_model ?? o.message?.airframe?.manufacturerModel ?? "",
      tail: o.tail || o.registration || "",
      flight: extractFlightDisplay(o.raw || o),
      routeLookup: extractRouteLookup(o.raw || o) || extractRouteLookup(o),
      label: String(o.label || (String(o.type || o.message_type || '').trim() === 'hfdl_data' ? 'HFDL' : '') || ""),
      type: String(o.type || o.message_type || ""),
      lat: lat,
      lon: lon,
      summary: buildHFDLSummary(o.raw || o) || o.summary || o.text || "",
      raw: o.raw || o
    };
  });
}

function buildSelect(select, values, allLabel){
  select.innerHTML = '';
  const opt0 = document.createElement('option');
  opt0.value = '';
  opt0.textContent = allLabel;
  select.appendChild(opt0);
  for (const v of values){
    const o = document.createElement('option');
    o.value = v;
    o.textContent = v;
    select.appendChild(o);
  }
}

function applyData(newRows){
  rows = Array.isArray(newRows) ? newRows : [];
  buildSelect(document.getElementById('label'), uniq(rows.map(r => r.label).filter(Boolean)), 'All labels');
  buildSelect(document.getElementById('type'), uniq(rows.map(r => r.type).filter(Boolean)), 'All types');
  page = 0;
  recomputeFilterAndRender();
}

function extractRowSearchText(row){
  const candidates = [
    row?.raw?.message?.text,
    row?.raw?.message?.msg_text,
    row?.raw?.text,
    row?.raw?.msg_text,
    row?.message?.text,
    row?.message?.msg_text,
    row?.text,
    row?.msg_text,
  ];

  for (const candidate of candidates){
    if (typeof candidate !== 'string') continue;
    const trimmed = candidate.trim();
    if (trimmed) return trimmed;
  }

  return '';
}

function getRowMessageLabel(row){
  return String(row?.raw?.message?.label || row?.message?.label || row?.label || '').trim().toUpperCase();
}

function extractProtocolSearchText(row){
  if (!row || typeof row !== 'object') return '';

  const cached = protocolSearchTextCache.get(row);
  if (typeof cached === 'string') return cached;

  const messageLabel = getRowMessageLabel(row);
  if (!['AA', 'BA', 'A6', 'B6', 'MA'].includes(messageLabel)) {
    protocolSearchTextCache.set(row, '');
    return '';
  }

  const rawText = extractRowSearchText(row);
  const expandedText = getDisplayRawText(row, messageLabel, rawText);
  const searchText = typeof expandedText === 'string' ? expandedText.trim() : '';
  protocolSearchTextCache.set(row, searchText);
  return searchText;
}

function recomputeFilter(){
  const q = document.getElementById('q').value.trim().toLowerCase();
  const lbl = document.getElementById('label').value;
  const typ = document.getElementById('type').value;
  const searchTextOnly = document.getElementById('searchTextOnly').checked;
  const searchProtocolText = document.getElementById('searchProtocolText').checked;
  const onlyCoords = document.getElementById('onlyCoords').checked;
  const onlyFlight = document.getElementById('onlyFlight').checked;
  const onlyRoute = document.getElementById('onlyRoute').checked;
  const onlyMeteo = document.getElementById('onlyMeteo').checked;

  const idx = [];
  for (let i=0; i<rows.length; i++){
    const r = rows[i];
    const flightDisplay = getFlightDisplayForRow(r);
    if (onlyCoords && !(isNum(r.lat) && isNum(r.lon))) continue;
    if (onlyFlight && !flightDisplay.trim()) continue;
    if (onlyRoute && !rowHasParsedRoute(r)) continue;
    if (onlyMeteo && !rowHasMeteo(r)) continue;
    if (lbl && r.label !== lbl) continue;
    if (typ && r.type !== typ) continue;
    if (q){
      const routeText = `${r.routeLookup?.route || ''} ${r.routeLookup?.updatetime || ''}`.trim();
      const hayParts = [];
      if (searchTextOnly) {
        hayParts.push(extractRowSearchText(r).toLowerCase());
      }
      if (searchProtocolText) {
        const protocolText = extractProtocolSearchText(r);
        if (protocolText) hayParts.push(protocolText.toLowerCase());
      }
      if (!hayParts.length) {
        hayParts.push(`${r.tail} ${flightDisplay} ${r.label} ${r.type} ${routeText} ${r.summary}`.toLowerCase());
      }
      const hay = hayParts.join(' ');
      if (!hay.includes(q)) continue;
    }
    idx.push(i);
  }
  filteredIdx = idx;
  applySort();
}

function pageSize(){
  return parseInt(document.getElementById('pageSize').value || "100", 10);
}

function clampPage(){
  const ps = pageSize();
  const maxPage = Math.max(0, Math.ceil(filteredIdx.length / ps) - 1);
  if (page > maxPage) page = maxPage;
  if (page < 0) page = 0;
}

function updatePageInfo(){
  const ps = pageSize();
  const maxPage = Math.max(0, Math.ceil(filteredIdx.length / ps) - 1);
  document.getElementById('pageInfo').textContent =
    `Page ${page+1} / ${maxPage+1} • Filtered: ${filteredIdx.length} • Total: ${rows.length}`;
}

function recomputeFilterAndRender(){
  recomputeFilter();
  clampPage();
  renderPage();
  updateLoadsheetStats();
}

function buildMessageSummaryText(row){
  const parts = [];
  if (row?.summary) parts.push(row.summary);
  if (isNum(row?.lat) && isNum(row?.lon)) parts.push(`lat ${row.lat}, lon ${row.lon}`);
  return parts.join(' • ');
}

function shouldCollapseMessageSummary(text){
  const normalised = String(text || '').replace(/\r\n/g, '\n').trim();
  if (!normalised) return false;
  const logicalLines = normalised.split('\n').length;
  return logicalLines > MESSAGE_PREVIEW_LINES || normalised.length > 1400;
}

function getVisibleRowIndices(){
  const ps = pageSize();
  const start = page * ps;
  const end = Math.min(filteredIdx.length, start + ps);
  return filteredIdx.slice(start, end);
}

function getExpandableVisibleRowIndices(){
  return getVisibleRowIndices().filter((rowIndex) => shouldCollapseMessageSummary(buildMessageSummaryText(rows[rowIndex])));
}

function areVisibleMessagesExpanded(){
  const visible = getExpandableVisibleRowIndices();
  return visible.length > 0 && visible.every((rowIndex) => expandedMessageRows.has(rowIndex));
}

function updateToggleAllMessagesButton(){
  const button = document.getElementById('toggleAllMessages');
  if (!button) return;

  const visible = getExpandableVisibleRowIndices();
  const allExpanded = visible.length > 0 && visible.every((rowIndex) => expandedMessageRows.has(rowIndex));
  button.disabled = visible.length === 0;
  button.textContent = allExpanded ? 'Skupi sve' : 'Raširi sve';
  button.title = allExpanded
    ? 'Skupi sve vidljive poruke na 18 redova'
    : 'Raširi sve vidljive poruke komplet';
}

function toggleAllVisibleMessages(){
  const visible = getExpandableVisibleRowIndices();
  if (!visible.length) return;

  if (visible.every((rowIndex) => expandedMessageRows.has(rowIndex))) {
    for (const rowIndex of visible) expandedMessageRows.delete(rowIndex);
  } else {
    for (const rowIndex of visible) expandedMessageRows.add(rowIndex);
  }

  renderPage();
}

function applyMessageSummaryExpansion(code, button, expanded){
  code.classList.toggle('is-collapsed', !expanded);
  button.textContent = expanded ? '▾' : '▸';
  button.setAttribute('aria-expanded', expanded ? 'true' : 'false');
  button.title = expanded ? 'Skupi poruku na 18 redova' : 'Raširi poruku komplet';
}

function makeMessageSummaryBlock(rowIndex){
  const row = rows[rowIndex];
  const text = buildMessageSummaryText(row);
  const wrapper = document.createElement('div');
  wrapper.className = 'message-summary';

  const code = document.createElement('code');
  code.className = 'message-summary-code';
  code.textContent = text;

  if (!shouldCollapseMessageSummary(text)) {
    wrapper.appendChild(code);
    return wrapper;
  }

  const layout = document.createElement('div');
  layout.className = 'message-summary-row';

  const button = document.createElement('button');
  button.type = 'button';
  button.className = 'btn-mini btn-mini-secondary message-expand-toggle';

  const expanded = expandedMessageRows.has(rowIndex);
  applyMessageSummaryExpansion(code, button, expanded);

  button.addEventListener('click', () => {
    if (expandedMessageRows.has(rowIndex)) expandedMessageRows.delete(rowIndex);
    else expandedMessageRows.add(rowIndex);
    applyMessageSummaryExpansion(code, button, expandedMessageRows.has(rowIndex));
    updateToggleAllMessagesButton();
  });

  layout.appendChild(button);
  layout.appendChild(code);
  wrapper.appendChild(layout);
  return wrapper;
}

function makeDetailsCell(rowIndex){
  const r = rows[rowIndex];
  const wrap = document.createElement('div');

  const header = makeMessageSummaryBlock(rowIndex);
  wrap.appendChild(header);

   const messageLabel = String(
     r?.label ??
     r?.raw?.message?.label ??
     r?.raw?.label ??
     ''
   ).trim().toUpperCase();

  // Raw message text (preserve newlines). Extract from common locations.
  const rawText =
    (r && r.raw && r.raw.message && (r.raw.message.text ?? r.raw.message.msg_text)) ??
    (r && r.raw && (r.raw.text ?? r.raw.msg_text)) ??
    "";
   const displayRawText = getDisplayRawText(r, messageLabel, rawText);
   const showRawText = typeof displayRawText === 'string' && displayRawText.trim() !== '';
   if (showRawText){
    const detRaw = document.createElement('details');
    const sumRaw = document.createElement('summary');
    sumRaw.textContent = 'raw text';
    detRaw.appendChild(sumRaw);

    const pre = document.createElement('pre');
    pre.className = 'rawtext';
    pre.textContent = String(displayRawText);
    detRaw.appendChild(pre);

    wrap.appendChild(detRaw);
  }

  const det = document.createElement('details');
  const sum = document.createElement('summary');
  sum.textContent = 'parsed details';
  det.appendChild(sum);

  det.addEventListener('toggle', () => {
    const lazy = document.getElementById('lazyDetails').checked;
    if (!det.open){
      const box = det.querySelector('.kvbox');
      if (box) box.remove();
      return;
    }
    if (det.querySelector('.kvbox')) return;

    const placeholder = document.createElement('div');
    placeholder.className = 'kvbox';
    placeholder.textContent = 'Rendering...';
    det.appendChild(placeholder);

    const renderNow = () => {
