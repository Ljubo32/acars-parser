    .sort((left, right) => (left._order ?? 0) - (right._order ?? 0))
    .map((point) => {
      const copy = Object.assign({}, point);
      delete copy._order;
      delete copy._layerSeen;
      return copy;
    });
}

function collectWaypointPoints(source, points, defaults){
  if (!source || typeof source !== 'object') return;

  if (Array.isArray(source.points)){
    for (const point of source.points){
      appendWaypointPoint(points, point, defaults);
    }
  }

  if (Array.isArray(source.waypoints)){
    for (const point of source.waypoints){
      appendWaypointPoint(points, point, defaults);
    }
  }

  if (Array.isArray(source.approach_waypoints)){
    for (const point of source.approach_waypoints){
      appendWaypointPoint(points, point, Object.assign({ segment: 'approach' }, defaults || {}));
    }
  }

  if (Array.isArray(source.route_winds)){
    for (const layer of source.route_winds){
      const flightLevel = coerceNum(layer?.flight_level);
      if (!Array.isArray(layer?.waypoints)) continue;
      for (const point of layer.waypoints){
        appendWaypointPoint(points, point, Object.assign({ flight_level: flightLevel, segment: 'route_wind' }, defaults || {}));
      }
    }
  }
}

function getWaypointsFromRow(r){
  if (!r || !r.raw) return [];
  if (waypointRowCache.has(r)){
    return waypointRowCache.get(r);
  }

  const points = [];
  collectWaypointPoints(r.raw, points);
  if (Array.isArray(r.raw.results)){
    for (const result of r.raw.results){
      collectWaypointPoints(result, points);
    }
  }

  const resolved = resolveWaypointSequence(points);
  const aggregated = aggregateWaypointPoints(resolved);
  waypointRowCache.set(r, aggregated);
  return aggregated;
}

function getPrimaryMapPoint(r){
  if (r && isNum(r.lat) && isNum(r.lon)){
    return { lat: r.lat, lon: r.lon };
  }
  const waypoints = getWaypointsFromRow(r);
  for (const point of waypoints){
    const lat = coerceNum(point && (point.latitude ?? point.lat));
    const lon = coerceNum(point && (point.longitude ?? point.lon));
    if (isNum(lat) && isNum(lon)){
      return { lat, lon };
    }
  }
  return null;
}

function renderPage(){
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  const ps = pageSize();
  const start = page * ps;
  const end = Math.min(filteredIdx.length, start + ps);

  for (let j=start; j<end; j++){
    const i = filteredIdx[j];
    const r = rows[i];
    const flightDisplay = getFlightDisplayForRow(r);
    const manufacturerModel = String(r.manufacturerModel || '').trim();

    const tr = document.createElement('tr');

    const tdTs = document.createElement('td');
    tdTs.className = 'tscell';
    tdTs.innerHTML = `<div class="tsmain">${escapeHtml(formatTimestamp(r.timestamp))}</div>`;
    const tdTail = document.createElement('td'); tdTail.textContent = r.tail || '';
    const tdFlight = document.createElement('td');
    const routeDisplay = getRouteDisplayState(r);
    const routeValue = routeDisplay.routeValue;
    const routeUpdatedAt = routeDisplay.routeUpdatedAt;
    if (flightDisplay || routeDisplay.primaryRouteValue || routeUpdatedAt){
      const flightWrap = document.createElement('div');
      if (flightDisplay){
        const flightMain = document.createElement('div');
        flightMain.className = 'routecell-main routecell-mainline';

        const flightText = document.createElement('span');
        flightText.textContent = flightDisplay;
        flightMain.appendChild(flightText);

        if (routeDisplay.primaryRouteSource) {
          const badge = document.createElement('span');
          badge.className = `route-source-badge route-source-badge-${routeDisplay.primaryRouteSource}`;
          badge.textContent = routeDisplay.primaryRouteSource;
          flightMain.appendChild(badge);
        }

        flightWrap.appendChild(flightMain);
      }
      if (routeDisplay.primaryRouteValue) {
        const routeMain = document.createElement('div');
        routeMain.className = routeDisplay.routeMismatch && routeValue ? 'routecell-sub routecell-alert' : 'routecell-sub';
        routeMain.textContent = routeDisplay.primaryRouteValue;
        flightWrap.appendChild(routeMain);
      }
      for (const airportName of routeDisplay.airportLegNames || []) {
        const airportLine = document.createElement('div');
        airportLine.className = 'routecell-airport';
        airportLine.textContent = airportName;
        flightWrap.appendChild(airportLine);
      }
      if (routeDisplay.routeMismatch && routeValue && routeDisplay.parsedRouteValue) {
        const routeCandidate = document.createElement('div');
        routeCandidate.className = 'routecell-sub routecell-candidate';
        routeCandidate.textContent = `parsed candidate: ${routeDisplay.parsedRouteValue}`;
        flightWrap.appendChild(routeCandidate);
      }
      if (routeUpdatedAt){
        const routeSub = document.createElement('div');
        routeSub.className = routeDisplay.isUnixLikeUpdateTime ? 'routecell-sub routecell-alert' : 'routecell-sub';
        routeSub.textContent = routeUpdatedAt;
        flightWrap.appendChild(routeSub);
      }
      tdFlight.appendChild(flightWrap);
    } else {
      tdFlight.innerHTML = '<span class="kvmini">—</span>';
    }
    const tdLbl = document.createElement('td'); tdLbl.innerHTML = `<span class="pill">${escapeHtml(r.label||'')}</span>`;
    const tdT = document.createElement('td'); tdT.innerHTML = `<span class="type">${escapeHtml(r.type||'')}</span>`;
    const tdC = document.createElement('td'); tdC.textContent = coordStr(r.lat, r.lon);

    const tdM = document.createElement('td');
    const rowWaypoints = getWaypointsFromRow(r);
    const mapActions = document.createElement('div');
    mapActions.className = 'map-action-stack';
    if ((isNum(r.lat) && isNum(r.lon)) || rowWaypoints.length){
      const btn = document.createElement('button');
      btn.className = 'btn-mini';
      btn.textContent = 'Prikaži na mapi';
      btn.addEventListener('click', () => openMapForRow(r));
      mapActions.appendChild(btn);
    }

    const routeActionRow = document.createElement('div');
    routeActionRow.className = 'map-action-row';
    const routePayload = buildRouteSavePayload(r);
    const flightKey = getFlightLookupKeyForRow(r);

    if (routePayload) {
      const saveBtn = document.createElement('button');
      saveBtn.className = 'btn-mini btn-mini-secondary';
      saveBtn.textContent = 'Upiši';
      saveBtn.title = `Upiši rutu ${routePayload.route} za ${routePayload.flight}`;
      saveBtn.addEventListener('click', async () => {
        saveBtn.disabled = true;
        try {
          await saveRouteForRow(r);
        } catch (err) {
          setRouteAPIStatus(`Route API: save failed for ${routePayload.flight}`, true);
          alert('Upis rute nije uspio: ' + err);
        } finally {
          saveBtn.disabled = false;
        }
      });
      routeActionRow.appendChild(saveBtn);
    }

    if (flightKey) {
      const reloadBtn = document.createElement('button');
      reloadBtn.className = 'btn-mini btn-mini-secondary';
      reloadBtn.textContent = 'Reload';
      reloadBtn.title = `Osveži route lookup za ${flightKey}`;
      reloadBtn.addEventListener('click', async () => {
        reloadBtn.disabled = true;
        try {
          await refreshRouteForRow(r);
        } catch (err) {
          setRouteAPIStatus(`Route API: refresh failed for ${flightKey}`, true);
          alert('Route refresh nije uspio: ' + err);
        } finally {
          reloadBtn.disabled = false;
        }
      });
      routeActionRow.appendChild(reloadBtn);
    }

    if (routeActionRow.childNodes.length) {
      mapActions.appendChild(routeActionRow);
    }

    if (mapActions.childNodes.length) {
      tdM.appendChild(mapActions);
    } else {
      tdM.innerHTML = '<span class="kvmini">—</span>';
    }

    const tdD = document.createElement('td');
    tdD.appendChild(makeDetailsCell(i));

    if (manufacturerModel) {
      tdFlight.rowSpan = 2;
      tdLbl.rowSpan = 2;
      tdT.rowSpan = 2;
      tdC.rowSpan = 2;
      tdM.rowSpan = 2;
      tdD.rowSpan = 2;
    }

    tr.appendChild(tdTs);
    tr.appendChild(tdTail);
    tr.appendChild(tdFlight);
    tr.appendChild(tdLbl);
    tr.appendChild(tdT);
    tr.appendChild(tdC);
    tr.appendChild(tdM);
    tr.appendChild(tdD);
    tbody.appendChild(tr);

    if (manufacturerModel) {
      const metaTr = document.createElement('tr');
      metaTr.className = 'metarow';

      const tdMeta = document.createElement('td');
      tdMeta.colSpan = 2;
      tdMeta.innerHTML = `<div class="leftmeta">${escapeHtml(manufacturerModel)}</div>`;
      metaTr.appendChild(tdMeta);

      tbody.appendChild(metaTr);
    }
  }

  updatePageInfo();
  updateSortHeaders();
  updateToggleAllMessagesButton();
  document.getElementById('subtitle').textContent =
    `Showing rows ${start+1}-${end} of ${filteredIdx.length} (filtered)`;
}

document.getElementById('file').addEventListener('change', async (ev) => {
  const f = ev.target.files && ev.target.files[0];
  if (!f) return;
  try {
    const txt = await f.text();
    const parsed = JSON.parse(txt);
    applyData(normalizeInput(parsed));
  } catch (e){
    alert("Failed to load JSON: " + e);
  }
});

document.getElementById('waypointsFile').addEventListener('change', async (ev) => {
  const f = ev.target.files && ev.target.files[0];
  if (!f) return;
  try {
    const text = await f.text();
    const lookup = parseWaypointLookupText(text);
    if (!lookup.size){
      alert('Waypoints file did not contain any usable coordinates.');
      return;
    }
    installWaypointLookup(lookup, f.name || 'waypoints file');
  } catch (e) {
    alert('Failed to load Waypoints.txt: ' + e);
  }
});

document.getElementById('airportsFile').addEventListener('change', async (ev) => {
  const f = ev.target.files && ev.target.files[0];
  if (!f) return;
  try {
    const text = await f.text();
    const lookup = parseAirportLookupJSON(text);
    if (!lookup.size){
      alert('Airports file did not contain any usable airport names.');
      return;
    }
    installAirportLookup(lookup, f.name || 'airports file');
  } catch (e) {
    alert('Failed to load airports.json: ' + e);
  }
});

for (const id of ['q','searchTextOnly','searchProtocolText','label','type','onlyCoords','onlyFlight','onlyRoute','onlyMeteo','pageSize']){
  document.getElementById(id).addEventListener('input', () => { page = 0; recomputeFilterAndRender(); });
  document.getElementById(id).addEventListener('change', () => { page = 0; recomputeFilterAndRender(); });
}

document.getElementById('reset').addEventListener('click', () => {
  document.getElementById('q').value = '';
  document.getElementById('searchTextOnly').checked = true;
  document.getElementById('searchProtocolText').checked = false;
  document.getElementById('label').value = '';
  document.getElementById('type').value = '';
  document.getElementById('onlyCoords').checked = false;
  document.getElementById('onlyFlight').checked = false;
  document.getElementById('onlyRoute').checked = false;
  document.getElementById('onlyMeteo').checked = false;
  document.getElementById('pageSize').value = '100';
  page = 0;
  recomputeFilterAndRender();
});

document.getElementById('thTimestamp').addEventListener('click', () => toggleSort('timestamp'));
document.getElementById('thTail').addEventListener('click', () => toggleSort('tail'));
document.getElementById('thFlight').addEventListener('click', () => toggleSort('flight'));
document.getElementById('thDetails').addEventListener('click', () => toggleSort('details'));
document.getElementById('toggleAllMessages').addEventListener('click', (ev) => {
  ev.stopPropagation();
  toggleAllVisibleMessages();
});
updateSortHeaders();
updateToggleAllMessagesButton();

document.getElementById('prev').addEventListener('click', () => { page--; clampPage(); renderPage(); });
document.getElementById('next').addEventListener('click', () => { page++; clampPage(); renderPage(); });

document.getElementById('showAllMap').addEventListener('click', () => {
  // Use current filter; if nothing loaded yet, warn
  if (!rows || !rows.length){ alert('Prvo učitaj JSON.'); return; }
  openMapAllFiltered();
});

document.getElementById('closeMap').addEventListener('click', () => {
  document.getElementById('mapModal').style.display = 'none';
});
document.getElementById('mapModal').addEventListener('click', (ev) => {
  if (ev.target && ev.target.id === 'mapModal'){
    document.getElementById('mapModal').style.display = 'none';
  }
});

tryLoadDefaultWaypointLookup();
tryLoadDefaultAirportLookup();
refreshRouteAPIConfig();

</script>
