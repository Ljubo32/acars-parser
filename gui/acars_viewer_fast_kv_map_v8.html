      try {
        placeholder.outerHTML = renderPreferredDetailsObject(r);
      } catch(e){
        placeholder.textContent = String(e);
      }
    };
    if (lazy) scheduleHeavy(renderNow); else renderNow();
  });

  wrap.appendChild(det);
  return wrap;
}

function getDisplayRawText(row, messageLabel, rawText){
  const raw = String(rawText || '').trimEnd();
  if (messageLabel !== 'AA' && messageLabel !== 'BA' && messageLabel !== 'SA' && messageLabel !== 'A6' && messageLabel !== 'B6' && messageLabel !== 'MA') return raw;

  const results = Array.isArray(row?.raw?.results) ? row.raw.results : [];

  if (messageLabel === 'MA') {
    const miam = results.find((it) => it && (it.message_type === 'miam_ack' || it.message_type === 'miam_data' || it.message_type === 'miam_assembled'));
    const expandedMIAM = formatMIAMRawText(raw, miam);
    if (expandedMIAM) return expandedMIAM;
  }

  if (messageLabel === 'SA') {
    const mediaadv = results.find((it) => it && it.message_type === 'media_advisory');
    const expandedMediaAdv = formatMediaAdvRawText(raw, mediaadv);
    if (expandedMediaAdv) return expandedMediaAdv;
  }

  const cpdlc = results.find((it) => it && (
    it.message_type === 'cpdlc' ||
    it.message_type === 'connect_request' ||
    it.message_type === 'connect_confirm' ||
    it.message_type === 'disconnect'
  ));
  const adsc = results.find((it) => {
    if (!it || typeof it !== 'object') return false;
    if (String(it.message_type || '').startsWith('uplink_')) return true;
    if (messageLabel === 'B6') {
      return String(it.direction || '').trim().toLowerCase() === 'downlink';
    }
    if (messageLabel !== 'A6') return false;

    const rawHex = String(it.raw_hex || '').trim();
    const direction = String(it.direction || '').trim().toLowerCase();
    return rawHex !== '' && direction === 'uplink';
  });

  const expanded = formatCPDLCRawText(raw, cpdlc);
  if (expanded) return expanded;

  const expandedADSC = formatADSCRawText(raw, adsc);
  if (expandedADSC) return expandedADSC;

  return expanded || raw;
}

// formatMIAMRawText expands the raw text view for MIAM (label MA) messages.
// The compressed payload (rawText) is shown first, followed by the decoded
// MIAM block from the parsed result — consistent with the CPDLC/ADS-C pattern.
function formatMIAMRawText(rawText, miam){
  const raw = String(rawText || '').trimEnd();
  if (!miam || typeof miam !== 'object') return raw;
  if (miam.message_type === 'miam_assembled') {
    const segs = miam.segment_count > 0 ? miam.segment_count : '?';
    const full = String(miam.assembled_payload || '').trim();
    const header = `[Reassembled MIAM payload – ${segs} segment${segs !== 1 ? 's' : ''}]`;
    return full ? `${header}\n${full}` : raw;
  }
  const formatted = String(miam.formatted_text || '').trim();
  if (!formatted) return raw;
  if (!raw) return formatted;
  return `${raw}\n\n${formatted}`;
}

function formatMediaAdvRawText(rawText, mediaadv){
  const raw = String(rawText || '').trimEnd();
  if (!mediaadv || typeof mediaadv !== 'object') return raw;

  const formatted = getMediaAdvFormattedText(mediaadv);
  if (!formatted) return raw;
  if (!raw) return formatted;

  return `${raw}\n${formatted}`.trim();
}

function getMediaAdvFormattedText(mediaadv){
  const direct = String(mediaadv?.formatted_text || '').trim();
  if (direct) return direct;

  const version = Number.isFinite(Number(mediaadv?.version)) ? Number(mediaadv.version) : 0;
  const currentDescription = String(mediaadv?.current_link?.description || mediaadv?.current_link?.code || '').trim();
  const linkTime = String(mediaadv?.link_time || '').trim();
  const state = mediaadv?.established ? 'established' : 'lost';
  const availableLinks = Array.isArray(mediaadv?.available_links)
    ? mediaadv.available_links
        .map((link) => String(link?.description || link?.code || '').trim())
        .filter(Boolean)
        .join(', ')
    : '';

  if (!currentDescription || !linkTime) return '';

  const lines = [
    `Media Advisory, version ${version}:`,
    `  Link ${currentDescription} ${state} at ${linkTime} UTC`,
    `  Available links: ${availableLinks || 'none'}`
  ];

  const extraText = String(mediaadv?.text || '').trim();
  if (extraText) {
    lines.push(`  Text: ${extraText}`);
  }

  return lines.join('\n');
}

function formatCPDLCRawText(rawText, cpdlc){
  if (!cpdlc || typeof cpdlc !== 'object') return '';

  const lines = [];
  if (rawText) {
    lines.push(rawText, '');
  }

  lines.push(cpdlcTitle(cpdlc));
  lines.push(cpdlc.direction === 'downlink' ? ' CPDLC Downlink Message:' : ' CPDLC Uplink Message:');

  const headerLines = [];
  if (cpdlc.header && typeof cpdlc.header === 'object') {
    if (cpdlc.header.msg_id !== undefined && cpdlc.header.msg_id !== null && cpdlc.header.msg_id !== '') {
      headerLines.push(`   Msg ID: ${cpdlc.header.msg_id}`);
    }
    if (cpdlc.header.timestamp && typeof cpdlc.header.timestamp === 'object') {
      const hours = cpdlc.header.timestamp.hours;
      const minutes = cpdlc.header.timestamp.minutes;
      const seconds = cpdlc.header.timestamp.seconds;
      if (Number.isFinite(hours) && Number.isFinite(minutes)) {
        let timestamp = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
        if (Number.isFinite(seconds)) {
          timestamp += `:${String(seconds).padStart(2, '0')}`;
        }
        headerLines.push(`   Timestamp: ${timestamp}`);
      }
    }
  }
  if (headerLines.length) {
    lines.push('  Header:', ...headerLines);
  }

  const elementLines = [];
  if (Array.isArray(cpdlc.elements) && cpdlc.elements.length) {
    for (const element of cpdlc.elements) {
      const label = String(element?.label || '').trim() || '[element]';
      const text = String(element?.text ?? element?.data?.text ?? '').trim();

      // When the Go parser has already resolved all [placeholder] substitutions,
      // prefer the substituted text — it is more informative than the template
      // label and avoids spurious detail-line rendering from unrelated data fields.
      if (text && text !== label) {
        // The element text may span multiple lines (e.g. a position report with
        // one field per line).  Push each sub-line individually so the 3-space
        // indent is preserved on every line, not just the first.
        for (const subLine of text.split('\n')) {
          elementLines.push(`   ${subLine}`);
        }
        continue;
      }

      // No substitution was possible; show the template label and attempt
      // structured detail rendering (e.g., for position reports).
      elementLines.push(`   ${label}`);
      const detailLines = formatCPDLCRawElementDetails(element);
      for (const line of detailLines) {
        elementLines.push(`    ${line}`);
      }
    }
  } else if (typeof cpdlc.formatted_text === 'string' && cpdlc.formatted_text.trim()) {
    elementLines.push('   [formatted_text]');
    elementLines.push(`    ${cpdlc.formatted_text.trim()}`);
  }

  if (elementLines.length) {
    lines.push('  Message data:', ...elementLines);
  }

  return lines.join('\n').trim();
}

function formatCPDLCRawElementDetails(element){
  const data = element?.data;
  if (!data || typeof data !== 'object') return [];

  const lines = [];
  const label = String(element?.label || '').trim();
  const text = String(data.text || '').trim();

  const positionLatitude = Number(data?.position?.latitude);
  const positionLongitude = Number(data?.position?.longitude);
  if (Number.isFinite(positionLatitude)) {
    lines.push(`Latitude:   ${formatCPDLCAngleLine(positionLatitude, 'lat')}`);
  }
  if (Number.isFinite(positionLongitude)) {
    lines.push(`Longitude: ${formatCPDLCAngleLine(positionLongitude, 'lon')}`);
  }

  const positionName = String(data?.position?.name || '').trim();
  if (positionName) {
    lines.push(`Fix: ${positionName}`);
  }

  const altitudeType = String(data.type || '').trim().toLowerCase();
  const altitudeValue = Number(data.value);
  if (Number.isFinite(altitudeValue)) {
    if (altitudeType === 'flight_level') {
      lines.push(`Flight level: ${altitudeValue}`);
    } else if (altitudeType === 'feet') {
      lines.push(`Altitude: ${altitudeValue} ft`);
    } else if (altitudeType === 'meters') {
      lines.push(`Altitude: ${altitudeValue} m`);
    }
  }

  // The "unit" field is shared between ICAO unit-name elements (where it holds
  // a facility designation string such as "EGTT") and DistanceOffset elements
  // (where it holds a distance unit such as "nm" or "km").  Only render it as
  // a facility name when the element label explicitly references [icaounitname].
  const unit = String(data.unit || '').trim();
  if (unit && label.includes('[icaounitname]')) {
    lines.push(`Facility Name: ${unit}`);
  }

  const unitType = String(data.unit_type || '').trim();
  if (unitType) {
    lines.push(`Facility function: ${unitType}`);
  }

  const frequencyType = String(data?.frequency?.type || '').trim().toLowerCase();
  const frequencyValue = Number(data?.frequency?.value);
  if (Number.isFinite(frequencyValue)) {
    const prefix = frequencyType ? `${frequencyType.toUpperCase()}: ` : 'Frequency: ';
    let suffix = '';
    let valueText = formatCompactNumber(frequencyValue, 3);
    if (frequencyType === 'vhf' || frequencyType === 'uhf') {
      suffix = ' MHz';
      valueText = frequencyValue.toFixed(3);
    } else if (frequencyType === 'hf') {
      suffix = ' kHz';
      valueText = Number.isInteger(frequencyValue) ? String(frequencyValue) : formatCompactNumber(frequencyValue, 3);
    }
    lines.push(`${prefix}${valueText}${suffix}`.trim());
  }

  const timeHours = data?.time?.hours;
  const timeMinutes = data?.time?.minutes;
  const timeSeconds = data?.time?.seconds;
  if (Number.isFinite(timeHours) && Number.isFinite(timeMinutes)) {
    let timeText = `${String(timeHours).padStart(2, '0')}:${String(timeMinutes).padStart(2, '0')}`;
    if (Number.isFinite(timeSeconds)) {
      timeText += `:${String(timeSeconds).padStart(2, '0')}`;
    }
    lines.push(`Time: ${timeText}`);
  }

  const beaconCode = String(data.code || '').trim();
  if (beaconCode) {
    lines.push(`Code: ${beaconCode}`);
  }

  const facilityDesignation = String(data.facility_designation || '').trim();
  if (facilityDesignation) {
    lines.push(`Facility designation: ${facilityDesignation}`);
  }

  const errorDescription = String(data.description || '').trim();
  if (errorDescription) {
    lines.push(`Error information: ${errorDescription}`);
  }

  const tp4Table = String(data.tp4_table || '').trim();
  if (tp4Table) {
    lines.push(`TP4 table: ${tp4Table}`);
  }

  const routeInformation = Array.isArray(data?.route_clearance?.route_information) ? data.route_clearance.route_information : [];
  const airwayIntercept = String(data?.route_clearance?.airway_intercept || '').trim();
  const routeInfoAdditional = String(data?.route_clearance?.route_info_additional || '').trim();
  if (airwayIntercept || routeInformation.length || routeInfoAdditional) {
    lines.push('Route:');
    if (airwayIntercept) {
      lines.push(` Airway ID: ${airwayIntercept}`);
    }
    for (const routeItem of routeInformation) {
      for (const routeLine of formatCPDLCRouteInformationLines(routeItem)) {
        if (routeLine) {
          lines.push(` ${routeLine}`);
        }
      }
    }
    if (routeInfoAdditional) {
      lines.push(` Additional: ${routeInfoAdditional}`);
    }
  }

  if (text) {
    if (label === '[freetext]') {
      lines.push(text);
    } else if (text !== label) {
      lines.push(text);
    }
  }

  return lines;
}

function formatCPDLCRouteInformationLines(routeItem){
  if (!routeItem) return [];

  if (typeof routeItem === 'string') {
    const text = routeItem.trim();
    return text ? [`Route item: ${text}`] : [];
  }

  if (typeof routeItem !== 'object') {
    const text = String(routeItem).trim();
    return text ? [`Route item: ${text}`] : [];
  }

  const lines = [];
  const kind = String(routeItem.kind || '').trim().toLowerCase();
  const airway = String(routeItem.airway || '').trim();
  const text = String(routeItem.text || '').trim();
  const position = routeItem.position && typeof routeItem.position === 'object' ? routeItem.position : null;

  if (airway) {
    lines.push(`Airway ID: ${airway}`);
  }

  if (position) {
    const positionName = String(position.name || position.fix_name || '').trim();
    const latitude = Number(position.latitude);
    const longitude = Number(position.longitude);
    const bearing = Number(position.bearing);
    const distance = Number(position.distance);
    const distanceUnit = String(position.distance_unit || '').trim();

    if (positionName) {
      lines.push(`Fix: ${positionName}`);
    }
    if (Number.isFinite(latitude)) {
      lines.push(`Latitude:   ${formatCPDLCAngleLine(latitude, 'lat')}`);
    }
    if (Number.isFinite(longitude)) {
      lines.push(`Longitude: ${formatCPDLCAngleLine(longitude, 'lon')}`);
    }
    if (Number.isFinite(bearing)) {
      lines.push(`Bearing: ${formatCompactNumber(bearing, 1)} deg`);
    }
    if (Number.isFinite(distance)) {
      lines.push(`Distance: ${formatCompactNumber(distance, 1)}${distanceUnit ? ` ${distanceUnit}` : ''}`);
    }
  }

  if (text) {
    if (kind === 'airway' && !airway) {
      lines.push(`Airway ID: ${text}`);
    } else {
      lines.push(`Route item: ${text}`);
    }
  }

  return lines;
}

function formatCPDLCAngleLine(value, axis){
  const absolute = Math.abs(Number(value));
  if (!Number.isFinite(absolute)) return '';

  const isLatitude = axis === 'lat';
  const direction = isLatitude
    ? (value < 0 ? 'south' : 'north')
    : (value < 0 ? 'west' : 'east');
  const rounded = Math.round(absolute);
  const isWholeDegree = Math.abs(absolute - rounded) < 0.0001;

  if (isWholeDegree) {
    const degreeText = isLatitude ? String(rounded) : String(rounded).padStart(3, '0');
    return `${degreeText} deg ${direction}`;
  }

  return `${formatCompactNumber(absolute, 4)} deg ${direction}`;
}

function cpdlcTitle(cpdlc){
  const messageType = String(cpdlc?.message_type || '').trim().toLowerCase();
  switch (messageType) {
    case 'connect_request':
      return 'FANS-1/A CPDLC Connect Request:';
    case 'connect_confirm':
      return 'FANS-1/A CPDLC Connect Confirm:';
    case 'disconnect':
      return 'FANS-1/A CPDLC Disconnect Request:';
    default:
      return 'FANS-1/A CPDLC Message:';
  }
}

function formatADSCRawText(rawText, adsc){
  if (!adsc || typeof adsc !== 'object') return '';

  const direction = String(adsc.direction || '').trim().toLowerCase();
  if (direction === 'downlink') {
    return formatADSCDownlinkText(rawText, adsc);
  }

  const request = parseADSCUplinkRequest(adsc);
  if (!request) return '';

  const lines = [];
  if (rawText) {
    lines.push(rawText, '');
  }

  lines.push('ADS-C message:');
  if (request.kind === 'terminate') {
    lines.push(' Cancel all contracts and terminate connection');
    return lines.join('\n').trim();
  }
  if (request.kind === 'cancel') {
    lines.push(' Cancel contract:');
    if (Number.isFinite(request.contractNum)) {
      lines.push(`  Contract number: ${request.contractNum}`);
    }
    return lines.join('\n').trim();
  }
  if (request.kind === 'cancel_emergency') {
    lines.push(' Cancel emergency mode:');
    if (Number.isFinite(request.contractNum)) {
      lines.push(`  Contract number: ${request.contractNum}`);
    }
    return lines.join('\n').trim();
  }

  lines.push(adsContractTitle(request.kind));

  if (Number.isFinite(request.contractNum)) {
    lines.push(`  Contract number: ${request.contractNum}`);
  }

  if ((request.kind === 'periodic' || request.kind === 'emergency_periodic') && Number.isFinite(request.intervalSecs) && request.intervalSecs >= 0) {
    lines.push(`  Reporting interval: ${request.intervalSecs} seconds`);
  }

  for (const item of request.items) {
    lines.push(`  ${item}`);
  }

  return lines.join('\n').trim();
}

function formatADSCDownlinkText(rawText, adsc){
  const lines = [];
  if (rawText) {
    lines.push(rawText, '');
  }

  lines.push('ADS-C message:');
  lines.push(' Downlink message:');

  const messageTypeLine = formatADSCDownlinkType(adsc);
  if (messageTypeLine) {
    lines.push(`  ${messageTypeLine}`);
  }

  const headerLines = formatADSCDownlinkHeaderLines(adsc);
  if (headerLines.length) {
    lines.push('  Header:', ...headerLines.map((line) => `   ${line}`));
  }

  const basicLines = formatADSCDownlinkBasicLines(adsc);
  if (basicLines.length) {
    lines.push('  Basic report:', ...basicLines.map((line) => `   ${line}`));
  }

  const additionalSections = [
    ['Flight ID data', formatADSCDownlinkFlightIDLines(adsc)],
    ['Airframe ID data', formatADSCDownlinkAirframeLines(adsc)],
    ['Earth reference data', formatADSCDownlinkEarthRefLines(adsc)],
    ['Air reference data', formatADSCDownlinkAirRefLines(adsc)],
    ['Meteo data', formatADSCDownlinkMeteoLines(adsc)],
    ['Predicted route', formatADSCDownlinkPredictedRouteLines(adsc)]
  ];

  for (const [title, sectionLines] of additionalSections) {
    if (!sectionLines.length) continue;
    lines.push(`  ${title}:`, ...sectionLines.map((line) => `   ${line}`));
  }

  return lines.join('\n').trim();
}

function formatADSCDownlinkType(adsc){
  switch (String(adsc?.message_type || '').trim().toLowerCase()) {
    case 'basic':
      return 'Basic report';
    case 'emergency':
      return 'Emergency basic report';
    case 'lateral_deviation':
      return 'Lateral deviation event';
    case 'vert_rate_change':
      return 'Vertical rate change event';
    case 'altitude_range':
      return 'Altitude range event';
    case 'waypoint_change':
      return 'Waypoint change event';
    case 'acknowledgment':
      return 'Acknowledgment';
    case 'nack':
      return 'Negative acknowledgment';
    case 'noncompliance':
      return 'Noncompliance notification';
    case 'cancel_emergency':
      return 'Cancel emergency mode';
    default:
      return String(adsc?.message_type || '').trim();
  }
}

function formatADSCDownlinkHeaderLines(adsc){
  const lines = [];
  const flightId = String(adsc?.flight_id || '').trim();
  const adscFlightId = String(adsc?.adsc_flight_id || '').trim();
  const registration = String(adsc?.registration || '').trim();
  const groundStation = String(adsc?.ground_station || '').trim();
  const groundStationName = String(adsc?.ground_station_name || '').trim();
  const payloadBytes = Number(adsc?.payload_bytes);

  if (flightId) lines.push(`Flight ID: ${flightId}`);
  if (registration) lines.push(`Registration: ${registration}`);
  if (groundStation) {
    lines.push(`Ground station: ${groundStationName ? `${groundStation} (${groundStationName})` : groundStation}`);
  }
  if (adscFlightId && adscFlightId !== flightId) lines.push(`ADS-C flight ID: ${adscFlightId}`);
  if (Number.isFinite(payloadBytes) && payloadBytes > 0) lines.push(`Payload bytes: ${payloadBytes}`);
  return lines;
}

function formatADSCDownlinkBasicLines(adsc){
  const lines = [];
  const latitude = coerceNum(adsc?.latitude);
  const longitude = coerceNum(adsc?.longitude);
  const altitude = coerceNum(adsc?.altitude);
  const reportTime = coerceNum(adsc?.report_time_sec);
  const accuracy = coerceNum(adsc?.accuracy);

  if (isNum(latitude) && isNum(longitude)) {
    lines.push(`Position: ${formatADSCPosition(latitude, longitude)}`);
  }
  if (isNum(altitude)) {
    lines.push(`Altitude: ${Math.round(altitude)} ft`);
  }
  if (isNum(reportTime)) {
    lines.push(`Report time: ${formatADSReportTime(reportTime)} UTC`);
  }
  if (isNum(accuracy)) {
    lines.push(`Accuracy: ${Math.round(accuracy)}`);
  }
  if (adsc?.nav_redundancy !== undefined) {
    lines.push(`NAV redundancy: ${adsc.nav_redundancy ? 'available' : 'not available'}`);
  }
  if (adsc?.tcas_available !== undefined) {
    lines.push(`TCAS: ${adsc.tcas_available ? 'available' : 'not available'}`);
  }
  return lines;
}

function formatADSCDownlinkFlightIDLines(adsc){
  const value = String(adsc?.adsc_flight_id || '').trim();
  return value ? [`Flight ID: ${value}`] : [];
}

function formatADSCDownlinkAirframeLines(adsc){
  const value = String(adsc?.airframe_id || '').trim();
  return value ? [`ICAO: ${value}`] : [];
}

function formatADSCDownlinkEarthRefLines(adsc){
  const earthRef = adsc?.earth_ref;
  if (!earthRef || typeof earthRef !== 'object') return [];

  const lines = [];
  const track = coerceNum(earthRef.track_deg);
  const groundSpeed = coerceNum(earthRef.ground_speed_kts);
  const vertSpeed = coerceNum(earthRef.vert_speed_fpm);

  if (earthRef.track_invalid) lines.push('True track: invalid');
  else if (isNum(track)) lines.push(`True track: ${Math.round(track)}°`);
  if (isNum(groundSpeed)) lines.push(`Ground speed: ${formatCompactNumber(groundSpeed, 1)} kt`);
  if (isNum(vertSpeed)) lines.push(`Vertical speed: ${Math.round(vertSpeed)} ft/min`);
  return lines;
}

function formatADSCDownlinkAirRefLines(adsc){
  const airRef = adsc?.air_ref;
  if (!airRef || typeof airRef !== 'object') return [];

  const lines = [];
  const heading = coerceNum(airRef.heading_deg);
  const mach = coerceNum(airRef.mach);
  const vertSpeed = coerceNum(airRef.vert_speed_fpm);

  if (airRef.heading_invalid) lines.push('True heading: invalid');
  else if (isNum(heading)) lines.push(`True heading: ${Math.round(heading)}°`);
  if (isNum(mach)) lines.push(`Mach: ${formatCompactNumber(mach, 3)}`);
  if (isNum(vertSpeed)) lines.push(`Vertical speed: ${Math.round(vertSpeed)} ft/min`);
  return lines;
}

function formatADSCDownlinkMeteoLines(adsc){
  const meteo = adsc?.meteo;
  if (!meteo || typeof meteo !== 'object') return [];

  const lines = [];
  const windSpeed = coerceNum(meteo.wind_speed_kts);
  const windDirection = coerceNum(meteo.wind_direction_deg);
  const temperature = coerceNum(meteo.temperature_c);

  if (isNum(windSpeed)) {
    const windText = meteo.wind_dir_invalid || !isNum(windDirection)
      ? `${formatCompactNumber(windSpeed, 1)} kt`
      : `${Math.round(windDirection)}° / ${formatCompactNumber(windSpeed, 1)} kt`;
    lines.push(`Wind: ${windText}`);
  }
  if (isNum(temperature)) {
    lines.push(`Temperature: ${formatCompactNumber(temperature, 1)} C`);
  }
  return lines;
}

function formatADSCDownlinkPredictedRouteLines(adsc){
  const predictedRoute = adsc?.predicted_route;
  if (!predictedRoute || typeof predictedRoute !== 'object') return [];

  const lines = [];
  const nextWaypoint = formatADSRouteWaypoint(predictedRoute.next_waypoint, true);
  const nextNextWaypoint = formatADSRouteWaypoint(predictedRoute.next_next_waypoint, false);
  if (nextWaypoint) lines.push(`Next waypoint: ${nextWaypoint}`);
  if (nextNextWaypoint) lines.push(`Next+1 waypoint: ${nextNextWaypoint}`);
  return lines;
}

function formatADSRouteWaypoint(waypoint, includeEta){
  if (!waypoint || typeof waypoint !== 'object') return '';

  const latitude = coerceNum(waypoint.latitude);
  const longitude = coerceNum(waypoint.longitude);
  const altitude = coerceNum(waypoint.altitude_ft);
  const eta = coerceNum(waypoint.eta_seconds);
  const parts = [];

  if (isNum(latitude) && isNum(longitude)) {
    parts.push(formatADSCPosition(latitude, longitude));
  }
  if (isNum(altitude)) {
    parts.push(`FL ${Math.round(altitude / 100)}`);
  }
  if (includeEta && isNum(eta) && eta >= 0) {
    parts.push(`ETA ${formatADSReportTime(eta)}`);
  }
  return parts.join(' • ');
}

function formatADSCPosition(latitude, longitude){
  const lat = coerceNum(latitude);
  const lon = coerceNum(longitude);
  if (!isNum(lat) || !isNum(lon)) return '';

  const ns = lat < 0 ? 'S' : 'N';
  const ew = lon < 0 ? 'W' : 'E';
  return `${Math.abs(lat).toFixed(4)}°${ns} ${Math.abs(lon).toFixed(4)}°${ew}`;
}

function formatADSReportTime(seconds){
  const totalSeconds = Math.max(0, Math.round(Number(seconds) || 0));
  const hours = Math.floor(totalSeconds / 3600) % 24;
  const minutes = Math.floor((totalSeconds % 3600) / 60);
  const secs = totalSeconds % 60;
  return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
}

function adsContractTitle(kind){
  switch (String(kind || '').trim().toLowerCase()) {
    case 'event':
      return ' Event contract request:';
    case 'emergency_periodic':
      return ' Emergency periodic contract request:';
    default:
      return ' Periodic contract request:';
  }
}

function parseADSCUplinkRequest(adsc){
  const backendRequest = parseADSCUplinkRequestFromBackend(adsc);
  if (backendRequest) return backendRequest;

  const bytes = hexToBytes(String(adsc?.raw_hex || ''));
  const payloadBytes = Number(adsc?.payload_bytes || 0);
  const payload = payloadBytes > 0 ? bytes.slice(0, payloadBytes) : bytes;
  if (!payload.length) return null;

  const header = payload[0];
  if (header === 0x01) {
    return {
      kind: 'terminate',
      contractNum: null,
      intervalSecs: 0,
      items: ['Cancel all contracts and terminate connection']
    };
  }
  if (header === 0x02) {
    return {
      kind: 'cancel',
      contractNum: payload.length > 1 ? payload[1] : null,
      intervalSecs: 0,
      items: []
    };
  }
  if (header === 0x06) {
    return {
      kind: 'cancel_emergency',
      contractNum: payload.length > 1 ? payload[1] : null,
      intervalSecs: 0,
      items: []
    };
  }
  if (header === 0x07) {
    return parseADSPeriodicRequest(payload, adsc);
  }
  if (header === 0x08) {
    return parseADSEventRequest(payload, adsc);
  }
  if (header === 0x09) {
    const request = parseADSPeriodicRequest(payload, adsc);
    if (request) request.kind = 'emergency_periodic';
    return request;
  }

  return null;
}

function parseADSCUplinkRequestFromBackend(adsc){
  const contract = adsc?.contract_request;
  if (!contract || typeof contract !== 'object') return null;

  const kind = String(contract.kind || '').trim().toLowerCase();
  const messageType = String(adsc?.message_type || '').trim().toLowerCase();
  const resolvedKind = kind || inferADSContractKindFromMessageType(messageType);
  if (!resolvedKind) return null;

  const request = {
    kind: resolvedKind,
    contractNum: Number.isFinite(Number(contract.contract_num)) ? Number(contract.contract_num) : null,
    intervalSecs: Number.isFinite(Number(contract.interval_secs)) ? Number(contract.interval_secs) : 0,
    items: []
  };

  const groups = Array.isArray(contract.groups) ? contract.groups : [];
  let hasBackendGroups = false;
  for (const group of groups) {
    const line = formatADSContractRequestGroup(group, request);
    if (!line) continue;
    hasBackendGroups = true;
    request.items.push(line);
  }

  if (hasBackendGroups || resolvedKind === 'terminate' || resolvedKind === 'cancel' || resolvedKind === 'cancel_emergency') {
    return request;
  }

  return null;
}

function inferADSContractKindFromMessageType(messageType){
  switch (messageType) {
    case 'uplink_contract_request':
      return 'periodic';
    case 'uplink_cancel_contract':
      return 'cancel';
    case 'uplink_terminate_connection':
      return 'terminate';
    case 'uplink_cancel_emergency':
      return 'cancel_emergency';
    default:
      return '';
  }
}

function formatADSContractRequestGroup(group, request){
  if (!group || typeof group !== 'object') return '';

  const tag = Number(group.tag);
  const modulus = Number(group.modulus);
  const projectionMins = Number(group.projection_mins);
  const thresholdNm = Number(group.threshold_nm);
  const thresholdFpm = Number(group.threshold_fpm);
  const floorAlt = Number(group.floor_alt);
  const ceilingAlt = Number(group.ceiling_alt);
  const intervalSecs = Number(group.interval_secs);
  const higherThan = Boolean(group.higher_than);

  if (tag === 0x0B && Number.isFinite(intervalSecs)) {
    request.intervalSecs = intervalSecs;
    return '';
  }
  if (tag === 0x14 && group.report_waypoint_changes) {
    return 'Report waypoint changes';
  }
  if (tag === 0x15 && Number.isFinite(modulus)) {
    let line = `Aircraft intent data: every ${modulus} reports`;
    if (Number.isFinite(projectionMins) && projectionMins > 0) {
      line += `, projection time: ${projectionMins} minutes`;
    }
    return line;
  }
  if (tag === 0x0A && Number.isFinite(thresholdNm)) {
    return `Report when lateral deviation exceeds: ${thresholdNm.toFixed(3)} nm`;
  }
  if (tag === 0x12 && Number.isFinite(thresholdFpm)) {
    return `Report when vertical speed is: ${higherThan ? '>' : '<'}${thresholdFpm} ft/min`;
  }
  if (tag === 0x13 && Number.isFinite(floorAlt) && Number.isFinite(ceilingAlt)) {
    return `Report when altitude out of range: ${floorAlt}-${ceilingAlt} ft`;
  }

  const name = String(group.name || '').trim();
  if (name && Number.isFinite(modulus)) {
    return `${name}: every ${modulus} reports`;
  }

  return '';
}

function parseADSPeriodicRequest(payload, adsc){
  if (payload.length < 2) return null;

  const request = {
    kind: 'periodic',
    contractNum: payload[1],
    intervalSecs: Number(adsc?.contract_request?.interval_secs || 0),
    items: []
  };

  for (let index = 2; index < payload.length; ) {
    const tag = payload[index++];

    if (tag === 0x14) {
      request.items.push('Report waypoint changes');
      continue;
    }

    if (tag === 0x15) {
      if (index + 1 >= payload.length) break;
      const every = payload[index++];
      const projectionMinutes = payload[index++];
      let line = `Aircraft intent data: every ${every} reports`;
      if (projectionMinutes > 0) {
        line += `, projection time: ${projectionMinutes} minutes`;
      }
      request.items.push(line);
      continue;
    }

    if (tag === 0x13) {
      if (index + 3 >= payload.length) break;
      const ceilingAlt = decodeADSContractAltitude(payload[index], payload[index + 1]);
      const floorAlt = decodeADSContractAltitude(payload[index + 2], payload[index + 3]);
      index += 4;
      request.items.push(`Report when altitude out of range: ${floorAlt}-${ceilingAlt} ft`);
      continue;
    }

    if (index >= payload.length) break;
    const value = payload[index++];

    if (tag === 0x0B) {
      request.intervalSecs = decodeADSReportingInterval(value, request.intervalSecs);
      continue;
    }

    if (tag === 0x12) {
      const threshold = decodeADSVerticalSpeedThreshold(value);
      if (threshold) {
        request.items.push(`Report when vertical speed is: ${threshold}`);
      }
      continue;
    }

    if (tag === 0x0A) {
      request.items.push(`Report when lateral deviation exceeds: ${formatCompactNumber(value / 8, 3)} nm`);
      continue;
    }

    const label = adsPeriodicTagLabel(tag);
    if (label) {
      request.items.push(`${label}: every ${value} reports`);
    }
  }

  return request;
}

function parseADSEventRequest(payload, adsc){
  if (payload.length < 2) return null;

  const request = {
    kind: 'event',
    contractNum: payload[1],
    intervalSecs: 0,
    items: []
  };

  for (let index = 2; index < payload.length; ) {
    const tag = payload[index++];

    if (tag === 0x14) {
      request.items.push('Report waypoint changes');
      continue;
    }

    if (tag === 0x13) {
      if (index + 3 >= payload.length) break;
      const ceilingAlt = decodeADSContractAltitude(payload[index], payload[index + 1]);
      const floorAlt = decodeADSContractAltitude(payload[index + 2], payload[index + 3]);
      index += 4;
      request.items.push(`Report when altitude out of range: ${floorAlt}-${ceilingAlt} ft`);
      continue;
    }

    if (index >= payload.length) break;
    const value = payload[index++];

    if (tag === 0x12) {
      const threshold = decodeADSVerticalSpeedThreshold(value);
      if (threshold) {
        request.items.push(`Report when vertical speed is: ${threshold}`);
      }
      continue;
    }

    if (tag === 0x0A) {
      request.items.push(`Report when lateral deviation exceeds: ${formatCompactNumber(value / 8, 3)} nm`);
      continue;
    }

    if (tag === 0x0B) {
      request.intervalSecs = decodeADSReportingInterval(value, request.intervalSecs);
      continue;
    }

    const label = adsPeriodicTagLabel(tag);
    if (label) {
      request.items.push(`${label}: every ${value} reports`);
    }
  }

  return request;
}

function adsPeriodicTagLabel(tag){
  switch (tag) {
    case 0x0D: return 'Predicted route';
    case 0x0E: return 'Earth reference data';
    case 0x0F: return 'Air reference data';
    case 0x10: return 'Meteo data';
    case 0x11: return 'Airframe identification';
    default: return '';
  }
}

function decodeADSReportingInterval(value, fallbackSecs){
  if (Number.isFinite(value)) {
    const raw = Number(value) & 0xFF;
    const rate = raw & 0x3F;
    const scalingCode = (raw & 0xC0) >> 6;
    let scalingFactor = scalingCode;
    if (scalingCode === 2) scalingFactor = 8;
    if (scalingCode === 3) scalingFactor = 64;
    return scalingFactor * (rate + 1);
  }
  if (Number.isFinite(fallbackSecs) && fallbackSecs > 0) {
    return fallbackSecs;
  }
  return 0;
}

function decodeADSVerticalSpeedThreshold(value){
  if (!Number.isFinite(value)) return '';
  const raw = Number(value) & 0xFF;
  const signed = raw & 0x80 ? raw - 0x100 : raw;
  const threshold = Math.abs(signed * 64);
  const comparator = signed >= 0 ? '>' : '<';
  return `${comparator}${threshold} ft/min`;
}

function decodeADSContractAltitude(highByte, lowByte){
  if (!Number.isFinite(highByte) || !Number.isFinite(lowByte)) return 0;
  let raw = ((Number(highByte) & 0xFF) << 8) | (Number(lowByte) & 0xFF);
  if (raw & 0x8000) raw -= 0x10000;
  return raw * 4;
}

function hexToBytes(value){
  const clean = String(value || '').replace(/[^0-9A-F]/gi, '');
  const bytes = [];
  for (let index = 0; index + 1 < clean.length; index += 2) {
    bytes.push(parseInt(clean.slice(index, index + 2), 16));
  }
  return bytes;
}

function renderKeyValuePairs(pairs){
  const usable = Array.isArray(pairs)
    ? pairs.filter((pair) => Array.isArray(pair) && String(pair[1] ?? '').trim() !== '')
    : [];
  if (!usable.length) return '';

  let html = '<div class="kvbox"><div class="kvrows">';
  for (const [key, value] of usable){
    html += `<div class="kvrow"><div class="kvk">${escapeHtml(key)}</div><div class="kvv">${escapeHtml(value)}</div></div>`;
  }
  html += '</div></div>';
  return html;
}

function inferResultType(result, messageLabel){
  if (!result || typeof result !== 'object') return '';

  const messageType = String(result.message_type || result.msg_type || '').trim();
  if (messageType) return messageType;

  const label = String(messageLabel || '').trim().toUpperCase();
  const hfnpduType = String(result.hfnpdu_type || '').trim();
  if (hfnpduType) return 'hfdl_data';

  if (label === 'HFDL') {
    const flightId = String(result.flight_id || result.flight || '').trim();
    const lat = coerceNum(result.latitude ?? result.lat);
    const lon = coerceNum(result.longitude ?? result.lon);
    if (flightId || (isNum(lat) && isNum(lon))) {
      return 'hfdl_data';
    }
  }

  return '';
}

function extractGroundStationText(text){
  const match = String(text || '').match(/\bGS\s+(\d+)\b/i);
  return match ? match[1] : '';
}

function formatCompactNumber(value, decimals){
  const digits = Number.isFinite(decimals) ? decimals : 3;
  const fixed = Number(value).toFixed(digits);
  return fixed.replace(/\.0+$/, '').replace(/(\.\d*?)0+$/, '$1');
}

function formatHFDLFrequency(value){
  const freq = coerceNum(value);
  if (!isNum(freq) || freq <= 0) return '';

  if (freq >= 1000000) {
    return `${formatCompactNumber(freq / 1000, 3)} kHz`;
  }
  if (freq >= 1000) {
    return `${formatCompactNumber(freq, 3)} kHz`;
  }
  return formatCompactNumber(freq, 3);
}

function extractHFDLContext(value){
  if (!value || typeof value !== 'object') return null;

  if (String(value.hfnpdu_type || '').trim()) {
    return {
      result: value,
      message: (value.message && typeof value.message === 'object') ? value.message : null
    };
  }

  if (value.raw && typeof value.raw === 'object') {
    return extractHFDLContext(value.raw);
  }

  const message = (value.message && typeof value.message === 'object') ? value.message : null;
  const messageLabel = String(message?.label || value.label || '').trim().toUpperCase();
  const results = Array.isArray(value.results) ? value.results : [];

  for (const result of results) {
    if (!result || typeof result !== 'object') continue;
    if (inferResultType(result, messageLabel) === 'hfdl_data') {
      return { result, message };
    }
  }

  if (messageLabel === 'HFDL') {
    return { result: message || value, message };
  }

  return null;
}

function buildHFDLPairs(row){
  const context = extractHFDLContext(row);
  if (!context) return [];

  const result = context.result || {};
  const message = context.message || {};
  const flightId = String(result.flight_id || '').trim();
  const flight = String(extractFlightDisplay(row?.raw || row) || result.flight || '').trim();
  const tail = String(result.tail || row?.tail || message.tail || '').trim();
  const hfnpduType = String(result.hfnpdu_type || '').trim();
  const icao = String(result.icao || message?.airframe?.icao || '').trim().toUpperCase();
  const source = String(result.source || message.source || row?.raw?.source || '').trim();
  const groundStation = extractGroundStationText(message.text || row?.summary || '');
  const latitude = coerceNum(result.latitude ?? row?.lat ?? message.latitude ?? row?.raw?.latitude);
  const longitude = coerceNum(result.longitude ?? row?.lon ?? message.longitude ?? row?.raw?.longitude);
  const frequency = formatHFDLFrequency(message.frequency ?? row?.raw?.frequency ?? row?.frequency);
  const syntheticText = String(message.text || '').trim();

  const pairs = [];
  if (hfnpduType) pairs.push(['HFDL type', hfnpduType]);
  if (flightId) pairs.push(['Flight ID', flightId]);
  if (flight && flight !== flightId) pairs.push(['Flight', flight]);
  if (tail) pairs.push(['Tail/Reg', tail]);
  if (icao) pairs.push(['ICAO', icao]);
  if (groundStation) pairs.push(['Ground station', `GS ${groundStation}`]);
  if (frequency) pairs.push(['Frequency', frequency]);
  if (source) pairs.push(['Source', source]);
  if (isNum(latitude) && isNum(longitude)) pairs.push(['Coordinates', coordStr(latitude, longitude)]);
  if (syntheticText) pairs.push(['Synthetic text', syntheticText]);
  return pairs;
}

function extractH2WindContext(value){
  if (!value || typeof value !== 'object') return null;

  const message = (value.message && typeof value.message === 'object') ? value.message : null;
  const messageLabel = String(message?.label || value.label || '').trim().toUpperCase();
  const results = Array.isArray(value.results) ? value.results : [];

  for (const result of results) {
    if (!result || typeof result !== 'object') continue;
    const resultType = String(inferResultType(result, messageLabel) || '').trim().toUpperCase();
    const phase = String(result.phase || '').trim().toUpperCase();
    if (resultType === 'H2WIND' && (phase === '02A' || phase === '02D')) {
      return { result, message };
    }
  }

  return null;
}

function formatSignedDecimal(value, fractionDigits){
  if (!Number.isFinite(value)) return '';
  const digits = Number.isFinite(fractionDigits) ? fractionDigits : 1;
  const abs = Math.abs(value).toFixed(digits);
  if (value > 0) return `+${abs}`;
  if (value < 0) return `-${abs}`;
  return Number(0).toFixed(digits);
}

function buildH2InitialPairs(row){
  const context = extractH2WindContext(row?.raw || row);
  if (!context) return [];

  const result = context.result || {};
  const initialLayers = Array.isArray(result.initial_layers) ? result.initial_layers : [];
  if (!initialLayers.length) return [];

  const pairs = [];
  const route = [String(result.origin || '').trim(), String(result.destination || '').trim()].filter(Boolean).join(' -> ');
  if (route) pairs.push(['Route', route]);
  pairs.push(['Type', 'H2 start layers']);

  for (const layer of initialLayers){
    const altitudeFeet = coerceNum(layer?.altitude_feet);
    const altitudeMetres = coerceNum(layer?.altitude_metres);
    const temperatureC = coerceNum(layer?.temperature_c);
    const windDirDeg = coerceNum(layer?.wind_dir_deg);
    const windSpeedKt = coerceNum(layer?.wind_speed_kt);
    const windSpeedKmh = coerceNum(layer?.wind_speed_kmh);

    const key = Number.isFinite(altitudeMetres)
      ? `${Math.round(altitudeMetres)} m`
      : 'Layer';
    const valueParts = [];
    if (Number.isFinite(altitudeFeet)) valueParts.push(`${Math.round(altitudeFeet)} ft`);
    if (Number.isFinite(temperatureC)) valueParts.push(`${formatSignedDecimal(temperatureC, 1)} C`);
    if (Number.isFinite(windDirDeg) && Number.isFinite(windSpeedKmh)) {
      const windText = Number.isFinite(windSpeedKt)
        ? `${Math.round(windDirDeg)}° / ${Math.round(windSpeedKmh)} km/h (${Math.round(windSpeedKt)} kt)`
        : `${Math.round(windDirDeg)}° / ${Math.round(windSpeedKmh)} km/h`;
      valueParts.push(windText);
    }
    pairs.push([key, valueParts.join(' • ')]);
  }

  return pairs;
}

function buildHFDLSummary(value){
  const context = extractHFDLContext(value);
  if (!context) return '';

  const result = context.result || {};
  const message = context.message || {};
  const parts = [];
  const hfnpduType = String(result.hfnpdu_type || '').trim();
  const flightId = String(result.flight_id || '').trim();
  const icao = String(result.icao || message?.airframe?.icao || '').trim().toUpperCase();
  const groundStation = extractGroundStationText(message.text || '');

  if (hfnpduType) parts.push(hfnpduType);
  if (flightId) parts.push(`FID ${flightId}`);
  if (icao) parts.push(`ICAO ${icao}`);
  if (groundStation) parts.push(`GS ${groundStation}`);
  return parts.join(' • ');
}

function renderPreferredDetailsObject(row){
  const hfdlPairs = buildHFDLPairs(row);
  if (hfdlPairs.length) {
    return renderKeyValuePairs(hfdlPairs);
  }
  return renderDetailsObject(row?.raw ?? row);
}

function isHFDLRow(row){
  if (!row || typeof row !== 'object') return false;
  if (String(row.type || row.message_type || '').trim() === 'hfdl_data') return true;
  return !!extractHFDLContext(row);
}

function getDirectMarkerStyle(row){
  if (isHFDLRow(row)) {
    return {
      radius: 6,
      weight: 2,
      color: '#0f766e',
      fillColor: '#14b8a6',
      fillOpacity: 0.9
    };
  }

  return {
    radius: 4,
    weight: 1,
    fillOpacity: 0.8
  };
}

function getWaypointAggregateKey(point){
  const coords = waypointCoords(point);
  if (!coords) return '';

  const pointName = String(point?.name || point?.waypoint || point?.position_name || '').trim();
  return [
    normaliseWaypointName(pointName),
    coords.lat.toFixed(6),
    coords.lon.toFixed(6),
    String(point?.segment || '').trim()
  ].join('|');
}

function getWaypointPointExtremes(point){
  const layers = Array.isArray(point?.layers) && point.layers.length ? point.layers : [point];
  let coldestTemp = null;
  let fastestWind = null;

  for (const layer of layers){
    const temperature = coerceNum(layer?.temperature ?? layer?.temp);
    const windSpeed = coerceNum(layer?.wind_speed ?? layer?.windSpeed);
    if (Number.isFinite(temperature) && (!Number.isFinite(coldestTemp) || temperature < coldestTemp)) {
      coldestTemp = temperature;
    }
    if (Number.isFinite(windSpeed) && (!Number.isFinite(fastestWind) || windSpeed > fastestWind)) {
      fastestWind = windSpeed;
    }
  }

  return { coldestTemp, fastestWind };
}

function getRouteWindWaypointExtremes(rows){
  const coldestKeys = new Set();
  const fastestKeys = new Set();
  let minTemp = null;
  let maxWind = null;

  for (const row of rows || []){
    const waypoints = getWaypointsFromRow(row);
    for (const point of waypoints){
      if (String(point?.segment || '').trim() !== 'route_wind') continue;

      const key = String(point?._waypointKey || getWaypointAggregateKey(point) || '').trim();
      if (!key) continue;

      const pointExtremes = getWaypointPointExtremes(point);
      if (Number.isFinite(pointExtremes.coldestTemp)) {
        if (!Number.isFinite(minTemp) || pointExtremes.coldestTemp < minTemp) {
          minTemp = pointExtremes.coldestTemp;
          coldestKeys.clear();
          coldestKeys.add(key);
        } else if (pointExtremes.coldestTemp === minTemp) {
          coldestKeys.add(key);
        }
      }

      if (Number.isFinite(pointExtremes.fastestWind)) {
        if (!Number.isFinite(maxWind) || pointExtremes.fastestWind > maxWind) {
          maxWind = pointExtremes.fastestWind;
          fastestKeys.clear();
          fastestKeys.add(key);
        } else if (pointExtremes.fastestWind === maxWind) {
          fastestKeys.add(key);
        }
      }
    }
  }

  return { coldestKeys, fastestKeys, minTemp, maxWind };
}

function getWaypointExtremeState(point, extremes){
  const key = String(point?._waypointKey || getWaypointAggregateKey(point) || '').trim();
  if (!key || !extremes || typeof extremes !== 'object') {
    return { isColdest: false, isFastest: false };
  }

  return {
    isColdest: !!(extremes.coldestKeys && extremes.coldestKeys.has(key)),
    isFastest: !!(extremes.fastestKeys && extremes.fastestKeys.has(key))
  };
}

function getWaypointMarkerStyle(point, extremes){
  const baseStyle = { radius: 3, weight: 1, fillOpacity: 0.85 };
  const state = getWaypointExtremeState(point, extremes);

  if (state.isColdest && state.isFastest) {
    return Object.assign({}, baseStyle, {
      radius: 4,
      weight: 2,
      color: '#dc2626',
      fillColor: '#3b82f6',
      fillOpacity: 0.95
    });
  }
  if (state.isColdest) {
    return Object.assign({}, baseStyle, {
      radius: 4,
      weight: 2,
      color: '#1d4ed8',
      fillColor: '#60a5fa',
      fillOpacity: 0.95
    });
  }
  if (state.isFastest) {
    return Object.assign({}, baseStyle, {
      radius: 4,
      weight: 2,
      color: '#b91c1c',
      fillColor: '#f87171',
      fillOpacity: 0.95
    });
  }
  return baseStyle;
}

function flightLevelToMetres(flightLevel){
  if (!Number.isFinite(flightLevel) || flightLevel <= 0) return null;
  return Math.round(flightLevel * 30.48);
}

function formatH2FlightLevelText(flightLevel, isH2){
  if (!Number.isFinite(flightLevel) || flightLevel <= 0) return '';
  const flightLevelText = `FL ${Math.round(flightLevel)}`;
  if (!isH2) return flightLevelText;
  const altitudeMetres = flightLevelToMetres(flightLevel);
  return Number.isFinite(altitudeMetres)
    ? `${flightLevelText} • ${altitudeMetres} m`
    : flightLevelText;
}

function formatWaypointPopupDetails(point, extremeState, row){
  const pointName = String(point?.name || point?.waypoint || point?.position_name || '').trim();
  const segment = String(point?.segment || '').trim();
  const flightLevel = coerceNum(point?.flight_level ?? point?.flightLevel ?? point?.FL ?? point?.fl);
  const windDir = coerceNum(point?.wind_dir ?? point?.windDir);
  const windSpeed = coerceNum(point?.wind_speed ?? point?.windSpeed);
  const temperature = coerceNum(point?.temperature ?? point?.temp);
  const windSpeedKmh = Number.isFinite(windSpeed) ? windSpeed * 1.852 : null;
  const layers = Array.isArray(point?.layers) ? [...point.layers] : [];
  const isH2 = String(row?.label || '').trim().toUpperCase() === 'H2';

  let segmentText = '';
  if (segment === 'route_wind') segmentText = 'PWI route wind';
  else if (segment === 'approach') segmentText = 'Approach waypoint';
  else if (pointName) segmentText = 'Route waypoint';

  const pairs = [];
  if (segmentText) pairs.push(['Type', segmentText]);
  if (pointName) pairs.push(['Fix', pointName]);
  const extremes = extremeState || { isColdest: false, isFastest: false };
  const extremeLabels = [];
  if (extremes.isColdest) extremeLabels.push('Coldest point');
  if (extremes.isFastest) extremeLabels.push('Fastest wind');
  if (extremeLabels.length) pairs.push(['Extreme', extremeLabels.join(' • ')]);
  if (layers.length) {
    layers.sort((left, right) => {
      const a = coerceNum(left?.flight_level) ?? -1;
      const b = coerceNum(right?.flight_level) ?? -1;
      return a - b;
    });
    for (const layer of layers){
      const layerFlightLevel = coerceNum(layer?.flight_level);
      const layerWindDir = coerceNum(layer?.wind_dir);
      const layerWindSpeed = coerceNum(layer?.wind_speed);
      const layerWindSpeedKmh = Number.isFinite(layerWindSpeed) ? layerWindSpeed * 1.852 : null;
      const layerTemperature = coerceNum(layer?.temperature);
      const valueParts = [];
      if (Number.isFinite(layerWindDir) && Number.isFinite(layerWindSpeedKmh)) {
        valueParts.push(`${Math.round(layerWindDir)}° / ${Math.round(layerWindSpeedKmh)} km/h`);
      }
      if (Number.isFinite(layerTemperature)) {
        valueParts.push(`${Math.round(layerTemperature)} C`);
      }
      const layerKey = Number.isFinite(layerFlightLevel) && layerFlightLevel > 0
        ? formatH2FlightLevelText(layerFlightLevel, isH2)
        : 'Layer';
      if (valueParts.length) {
        pairs.push([layerKey, valueParts.join(' • ')]);
      }
    }
  } else {
    if (Number.isFinite(flightLevel) && flightLevel > 0) {
      pairs.push(['Flight level', formatH2FlightLevelText(flightLevel, isH2)]);
    }
    if (Number.isFinite(windDir) && Number.isFinite(windSpeedKmh)) pairs.push(['Wind', `${Math.round(windDir)}° / ${Math.round(windSpeedKmh)} km/h`]);
    if (Number.isFinite(temperature)) pairs.push(['Temperature', `${Math.round(temperature)} C`]);
  }
  if (point?.lookup_resolved) pairs.push(['Coordinates source', 'Waypoints.txt lookup']);
  return renderKeyValuePairs(pairs);
}

function coordStr(lat, lon){
  if (!(isNum(lat) && isNum(lon))) return '';
  return `${lat.toFixed(4)}, ${lon.toFixed(4)}`;
}


function openMapRows(pts, titleText, openFirstPopup){
  if (!Array.isArray(pts) || !pts.length){
    alert('No points with coords or multi-waypoint (in current filter).');
    return;
  }

  const firstPoint = pts.map(getPrimaryMapPoint).find(Boolean);
  const osm = firstPoint
    ? `https://www.openstreetmap.org/?mlat=${encodeURIComponent(firstPoint.lat)}&mlon=${encodeURIComponent(firstPoint.lon)}#map=6/${encodeURIComponent(firstPoint.lat)}/${encodeURIComponent(firstPoint.lon)}`
    : 'https://www.openstreetmap.org/';
  const osmLink = document.getElementById('osmLink');
  osmLink.href = osm;

  if (!window.L){
    window.open(osm, '_blank', 'noopener');
    return;
  }

  document.getElementById('mapTitle').textContent = titleText;

  const modal = document.getElementById('mapModal');
  modal.style.display = 'block';

  if (!map){
    map = L.map('map', { zoomControl: true });
    canvasRenderer = L.canvas({ padding: 0.5 });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 18,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);
  }

  if (!map.getPane('trackPane')){
    map.createPane('trackPane');
    map.getPane('trackPane').style.zIndex = 250;
    map.getPane('trackPane').style.pointerEvents = 'none';
  }

  if (marker) { try { marker.remove(); } catch(e) {} marker = null; }
  if (allLayer) { try { allLayer.remove(); } catch(e) {} allLayer = null; }
  allLayer = L.layerGroup().addTo(map);

  const labeledTails = new Set();
  let firstPopupMarker = null;
  const waypointExtremes = getRouteWindWaypointExtremes(pts);

  function getFlightLevelTextFromAny(obj){
    const flRaw = (obj?.flight_level ?? obj?.flightLevel ?? obj?.FL ?? obj?.fl ?? null);
    const flNum = coerceNum(flRaw);
    if (isNum(flNum) && flNum > 0 && flNum <= 999){
      return `FL ${Math.round(flNum)}`;
    }

    const altFt = coerceNum(
      obj?.altitude_ft ?? obj?.altitudeFt ?? obj?.alt_ft ?? obj?.altFt ??
      obj?.altitude ?? obj?.Altitude ?? obj?.alt ?? null
    );
    if (!isNum(altFt)) return '';
    if (altFt > 500){
      const fl = Math.round(altFt / 100);
      if (isFinite(fl) && fl > 0) return `FL ${fl}`;
    }

    const fl = Math.round(altFt);
    if (!isFinite(fl) || fl <= 0) return '';
    return `FL ${fl}`;
  }

  function getFlightLevelTextForRow(r){
    if (!r) return '';
    let t = getFlightLevelTextFromAny(r);
    if (t) return t;

    const raw = r.raw || null;
    if (raw){
      t = getFlightLevelTextFromAny(raw);
      if (t) return t;

      const res = raw.results;
      if (Array.isArray(res)){
        for (const it of res){
          t = getFlightLevelTextFromAny(it);
          if (t) return t;
        }
      }

      if (raw.message){
        t = getFlightLevelTextFromAny(raw.message);
        if (t) return t;
      }
    }
    return '';
  }

  function getFlightLevelTextForPoint(p, r){
    const t1 = getFlightLevelTextFromAny(p || {});
    if (t1) return t1;
    return getFlightLevelTextForRow(r);
  }

  function addTailLabel(latlng, tailLabel, flText){
    if (!tailLabel) return;
    const key = String(tailLabel).trim();
    if (!key || labeledTails.has(key)) return;

    const line2 = (flText && String(flText).trim()) ? `<div class="ptl2">${escapeHtml(flText)}</div>` : '';
    const ico = L.divIcon({
      className: 'ptlabel',
      html: `<div class="ptlabelbox"><div class="ptl1">${escapeHtml(key)}</div>${line2}</div>`,
      iconSize: [1,1],
      iconAnchor: [-6, 8]
    });
    L.marker(latlng, {icon: ico, interactive: false}).addTo(allLayer);
    labeledTails.add(key);
  }

  function addFLLabel(latlng, flText){
    if (!flText) return;
    const ico = L.divIcon({
      className: 'ptfl',
      html: `<div class="ptflbox">${escapeHtml(flText)}</div>`,
      iconSize: [1,1],
      iconAnchor: [-6, -8]
    });
    L.marker(latlng, {icon: ico, interactive: false}).addTo(allLayer);
  }

  function tsToMs(ts){
    if (ts === null || ts === undefined || ts === '') return 0;
    if (typeof ts === 'number' && isFinite(ts)){
      return ts < 1e12 ? ts * 1000 : ts;
    }
    if (typeof ts === 'string'){
      const s = ts.trim();
      if (/^-?\d+(?:\.\d+)?$/.test(s)){
        const n = Number(s);
        return isFinite(n) ? (n < 1e12 ? n * 1000 : n) : 0;
      }
      const d = new Date(ts);
      return isNaN(d.getTime()) ? 0 : d.getTime();
    }
    return 0;
  }

  // Maps tail callsign -> polyline metadata, used for click-to-highlight.
  const polylineByTail = new Map(); // tail -> { layer, baseStyle }
  const markersByTail  = new Map(); // tail -> Array<{cm, baseRadius}>
  let selectedTail = null;

  // Highlight the track line and all markers for the given tail.
  // Any previously selected tail is restored to its default style first.
  function highlightTail(tail) {
    if (selectedTail !== null && selectedTail !== tail) {
      restoreTailHighlight(selectedTail);
    }
    selectedTail = tail;
    const polylineEntry = polylineByTail.get(tail);
    if (polylineEntry && polylineEntry.layer) {
      polylineEntry.layer.setStyle({
        ...polylineEntry.baseStyle,
        weight: 4,
        color: '#1e40af',
        opacity: 1.0,
        dashArray: null
      });
    }
    const entries = markersByTail.get(tail);
    if (entries) {
      for (const entry of entries) {
        entry.cm.setRadius(entry.baseRadius + 2);
      }
    }
  }

  // Restore the track line and markers for the given tail to their default style.
  function restoreTailHighlight(tail) {
    const polylineEntry = polylineByTail.get(tail);
    if (polylineEntry && polylineEntry.layer) {
      polylineEntry.layer.setStyle(polylineEntry.baseStyle);
    }
    const entries = markersByTail.get(tail);
    if (entries) {
      for (const entry of entries) {
        entry.cm.setRadius(entry.baseRadius);
      }
    }
  }

  // The direct-position track only contains actual observed positions (r.lat/r.lon),
  // sorted chronologically.  Route waypoints are NOT mixed in here — mixing them
  // across messages with different timestamps caused zigzag and loops.
  const trackByTail = new Map();
  // Per-message route polylines: one entry per row that has ≥2 valid waypoints.
  const routeLinesByRow = [];
  for (const r of pts){
    const tail = (r.tail || '').trim();
    if (!tail) continue;

    const tms = tsToMs(r.timestamp);
    if (isNum(r.lat) && isNum(r.lon)){
      if (!trackByTail.has(tail)) trackByTail.set(tail, []);
      trackByTail.get(tail).push({lat: r.lat, lon: r.lon, t: tms});
    }

    // Collect route waypoints as a separate per-message polyline so that
    // waypoints from different messages are never interleaved.
    //
    // PWI messages carry one WD section per flight level (WD390/WD370/...).
    // Some waypoints appear only in certain FL sections — e.g. OGOLI only in
    // WD370.  If all sections are collapsed into one aggregated list first
    // (via getWaypointsFromRow), the FL-exclusive waypoints receive _order
    // values higher than the last waypoint of the first FL section, causing
    // the polyline to jump backwards after LIMES and scatter across the map.
    //
    // Fix: draw one dashed polyline per WD layer, each resolved independently
    // so that the waypoint sequence stays in geographic order.  For all other
    // message types (PDC, approach, etc.) the existing aggregated approach
    // is correct and is used as the fallback.
    const _rawRouteWinds = (() => {
      const _layers = [];
      if (Array.isArray(r.raw?.route_winds)) _layers.push(...r.raw.route_winds);
      if (Array.isArray(r.raw?.results)) {
        for (const _res of r.raw.results) {
          if (Array.isArray(_res?.route_winds)) _layers.push(..._res.route_winds);
        }
      }
      return _layers;
    })();

    if (_rawRouteWinds.length > 0) {
      // PWI route: one polyline per WD flight-level layer.
      for (const _layer of _rawRouteWinds) {
        if (!Array.isArray(_layer?.waypoints) || _layer.waypoints.length < 2) continue;
        // Build a minimal points list for this FL only, then resolve
        // coordinates using the same context-aware lookup as the normal path.
        const _rawPoints = _layer.waypoints.map(wp => {
          const _p = { name: wp.waypoint || '' };
          const _lat = coerceNum(wp.latitude);
          const _lon = coerceNum(wp.longitude);
          // Only carry explicit coords for coordinate-format waypoints; named
          // fixes (latitude === 0) are left for the database lookup.
          if (isNum(_lat) && isNum(_lon) && (_lat !== 0 || _lon !== 0)) {
            _p.latitude = _lat;
            _p.longitude = _lon;
          }
          return _p;
        });
        const _resolved = resolveWaypointSequence(_rawPoints);
        const _routeLatlngs = [];
        for (const _rp of _resolved) {
          const _lat = coerceNum(_rp.latitude ?? _rp.lat);
          const _lon = coerceNum(_rp.longitude ?? _rp.lon);
          if (isNum(_lat) && isNum(_lon)) _routeLatlngs.push([_lat, _lon]);
        }
        if (_routeLatlngs.length >= 2) {
          routeLinesByRow.push({latlngs: _routeLatlngs, tail});
        }
      }
    } else {
      // Non-PWI route (PDC, approach waypoints, etc.): use the aggregated
      // waypoints — no multi-FL issue applies here.
      const pArr = getWaypointsFromRow(r);
      if (pArr.length >= 2) {
        const routeLatlngs = [];
        for (const p of pArr) {
          const lat = coerceNum(p && (p.latitude ?? p.lat));
          const lon = coerceNum(p && (p.longitude ?? p.lon));
          if (isNum(lat) && isNum(lon)) routeLatlngs.push([lat, lon]);
        }
        if (routeLatlngs.length >= 2) {
          routeLinesByRow.push({latlngs: routeLatlngs, tail});
        }
      }
    }
  }

  // Draw the actual-position track per tail (solid line).
  for (const [tail, arr] of trackByTail.entries()){
    if (arr.length < 2) continue;
    arr.sort((a,b) => a.t - b.t);

    const latlngs = [];
    let prev = null;
    for (const p of arr){
      const cur = `${p.lat.toFixed(6)},${p.lon.toFixed(6)}`;
      if (cur === prev) continue;
      prev = cur;
      latlngs.push([p.lat, p.lon]);
    }
    if (latlngs.length < 2) continue;

    const baseStyle = {
      pane: 'trackPane',
      interactive: false,
      bubblingMouseEvents: false,
      weight: 2,
      color: '#3388ff',
      opacity: 0.7
    };
    const pl = L.polyline(latlngs, baseStyle).addTo(allLayer);
    polylineByTail.set(tail, { layer: pl, baseStyle });
  }

  // Draw per-message route waypoint lines (dashed, lighter weight).
  // Each line connects the waypoints from a single ACARS message in order,
  // preventing zigzag that would occur if waypoints from multiple messages
  // were joined into one polyline.
  for (const {latlngs, tail} of routeLinesByRow){
    const baseStyle = {
      pane: 'trackPane',
      interactive: false,
      bubblingMouseEvents: false,
      weight: 1.5,
      color: '#3388ff',
      opacity: 0.5,
      dashArray: '6, 5'
    };
    const routePl = L.polyline(latlngs, baseStyle).addTo(allLayer);
    // Only register as the tail's polyline if no solid position track exists,
    // so that click-to-highlight targets the solid line where one is present.
    if (!polylineByTail.has(tail)) polylineByTail.set(tail, { layer: routePl, baseStyle });
  }

  // Collect meteo data points for the stats panel.
  const meteoPoints = [];

  // Collect PWI route wind stats for the panel (per waypoint and per flight level).
  const pwiWaypointStatMap = new Map(); // waypointKey -> stat entry
  const pwiFlStatMap = new Map();       // flightLevel -> { temps[], winds[] }

  const allLatLngs = [];
  // Above this many rows, per-point FL labels are suppressed: they overlap
  // heavily and each divIcon marker adds a real DOM element (unlike canvas).
  const showFLLabels = pts.length <= 150;
  for (const r of pts){
    const tailLabel = (r.tail || r.registration || '').trim();
    // Tracks the circleMarker created for this row's direct position (if any),
    // so it can be attached to the meteo entry for popup-on-click support.
    let directMarker = null;

    if (isNum(r.lat) && isNum(r.lon)){
      const latlng = [r.lat, r.lon];
      allLatLngs.push(latlng);
      // Canvas renderer keeps all circleMarkers on one canvas element.
      const cm = L.circleMarker(latlng, { ...getDirectMarkerStyle(r), renderer: canvasRenderer });
      // Register this marker for track highlighting by tail callsign.
      const _directTail = (r.tail || '').trim();
      if (_directTail) {
        if (!markersByTail.has(_directTail)) markersByTail.set(_directTail, []);
        markersByTail.get(_directTail).push({ cm, baseRadius: cm.options.radius });
        cm.on('popupopen',  function() { highlightTail(_directTail); });
        cm.on('popupclose', function() { restoreTailHighlight(_directTail); });
      }
      // Popup content is built lazily — only when the user opens the popup —
      // so the expensive renderDetailsObject call is not paid on initial render.
      cm.bindPopup(function() {
        const hfdlPairs = buildHFDLPairs(r);
        const h2Pairs = buildH2InitialPairs(r);
        const hfdlContext = extractHFDLContext(r);
        const popupTitle = hfdlPairs.length
          ? `${String(extractFlightDisplay(r.raw || r) || r.tail || '').trim() || 'HFDL'} \u2022 ${String(hfdlContext?.result?.hfnpdu_type || r.type || '').trim() || 'data'} \u2022 ${String(r.label || 'HFDL').trim() || 'HFDL'}`
          : `${r.tail || ''} \u2022 ${r.type || ''} \u2022 ${r.label || ''}`;
        return `<div style="max-width:560px">
          <div class="nowrap"><b>${escapeHtml(popupTitle)}</b></div>
          <div class="kvmini" style="margin:4px 0 8px 0">${escapeHtml(formatTimestamp(r.timestamp))} \u2022 ${escapeHtml(coordStr(r.lat, r.lon))}</div>
          ${hfdlPairs.length ? renderKeyValuePairs(hfdlPairs) : h2Pairs.length ? renderKeyValuePairs(h2Pairs) : renderDetailsObject(r.raw)}
         </div>`;
      }, {maxWidth: 9999, maxHeight: 9999, className: 'big-popup'});
      cm.addTo(allLayer);
      if (!firstPopupMarker) firstPopupMarker = cm;
      directMarker = cm;

      addTailLabel(latlng, tailLabel, getFlightLevelTextForRow(r));
      if (showFLLabels) addFLLabel(latlng, getFlightLevelTextForRow(r));
    }

    // Collect meteorological data for the stats panel regardless of whether
    // this row has direct coordinates. Use the direct position if available,
    // otherwise find the first valid position anywhere in the raw data.
    {
      const meteoLatlng = (isNum(r.lat) && isNum(r.lon))
        ? [r.lat, r.lon]
        : (() => { const c = extractCoords(r.raw); return c ? [c.lat, c.lon] : null; })();
      if (meteoLatlng) {
        const meteoEntry = extractMeteoFromRow(r, meteoLatlng);
        if (meteoEntry) {
          // Attach the circleMarker so the stats panel can open its popup.
          meteoEntry.marker = directMarker;
          meteoPoints.push(meteoEntry);
        }
      }
    }

    const wpts = getWaypointsFromRow(r);
    for (let k=0; k<wpts.length; k++){
      const p = wpts[k];
      const lat = coerceNum(p && (p.latitude ?? p.lat));
      const lon = coerceNum(p && (p.longitude ?? p.lon));
      if (!(isNum(lat) && isNum(lon))) continue;

      const latlng = [lat, lon];
      allLatLngs.push(latlng);
  const waypointExtremeState = getWaypointExtremeState(p, waypointExtremes);
  const cm = L.circleMarker(latlng, { ...getWaypointMarkerStyle(p, waypointExtremes), renderer: canvasRenderer });
      // Register this waypoint marker for track highlighting by tail callsign.
      const _wptTail = (r.tail || '').trim();
      if (_wptTail) {
        if (!markersByTail.has(_wptTail)) markersByTail.set(_wptTail, []);
        markersByTail.get(_wptTail).push({ cm, baseRadius: cm.options.radius });
        cm.on('popupopen',  function() { highlightTail(_wptTail); });
        cm.on('popupclose', function() { restoreTailHighlight(_wptTail); });
      }

      addTailLabel(latlng, tailLabel, getFlightLevelTextForRow(r));
      // FL labels are intentionally omitted for route/PWI waypoints: they
      // clutter the map when a route has many points, and the FL is already
      // visible in the waypoint popup.

      cm.bindPopup(function() {
        const pointName = String(p?.name || p?.waypoint || `waypoint #${k+1}`).trim();
        return `<div style="max-width:560px">
          <div class="nowrap"><b>${escapeHtml(r.tail || '')}</b> \u2022 ${escapeHtml(pointName)} \u2022 ${escapeHtml(r.label || '')}</div>
          <div class="kvmini" style="margin:4px 0 8px 0">${escapeHtml(formatTimestamp(r.timestamp))} \u2022 ${escapeHtml(coordStr(lat, lon))}</div>
          ${formatWaypointPopupDetails(p, waypointExtremeState, r)}
         </div>`;
      }, {maxWidth: 9999, maxHeight: 9999, className: 'big-popup'});
      cm.addTo(allLayer);
      if (!firstPopupMarker) firstPopupMarker = cm;

      // Collect route wind data for the PWI statistics panel.
      if (String(p?.segment || '').trim() === 'route_wind') {
        const wpKey = getWaypointAggregateKey(p);
        if (wpKey) {
          if (!pwiWaypointStatMap.has(wpKey)) {
            pwiWaypointStatMap.set(wpKey, {
              name: String(p?.name || p?.waypoint || '').trim(),
              latlng,
              minTemp: null, maxTemp: null,
              maxWind: null, minWind: null,
              flStats: new Map(),
              marker: cm,
              markerForMinTemp: null,
              markerForMaxTemp: null,
              markerForMaxWind: null
            });
          }
          const pwiEntry = pwiWaypointStatMap.get(wpKey);
          // Always keep the reference to the most recently added circleMarker.
          // Leaflet stacks markers in insertion order, so the last one sits on
          // top and receives mouse clicks — this ensures the panel click opens
          // the same popup the user would get by clicking the point on the map.
          pwiEntry.marker = cm;
          // Each aggregated point may carry a layers[] array (one entry per FL).
          const layers = Array.isArray(p?.layers) ? p.layers : [p];
          for (const layer of layers) {
            const lTemp = coerceNum(layer?.temperature);
            const lWind = coerceNum(layer?.wind_speed);
            const lFL   = coerceNum(layer?.flight_level);
            if (Number.isFinite(lTemp)) {
              if (pwiEntry.minTemp === null || lTemp < pwiEntry.minTemp) {
                pwiEntry.minTemp = lTemp;
                pwiEntry.markerForMinTemp = cm;
              }
              if (pwiEntry.maxTemp === null || lTemp > pwiEntry.maxTemp) {
                pwiEntry.maxTemp = lTemp;
                pwiEntry.markerForMaxTemp = cm;
              }
            }
            if (Number.isFinite(lWind)) {
              if (pwiEntry.maxWind === null || lWind > pwiEntry.maxWind) {
                pwiEntry.maxWind = lWind;
                pwiEntry.markerForMaxWind = cm;
              }
              if (pwiEntry.minWind === null || lWind < pwiEntry.minWind) pwiEntry.minWind = lWind;
            }
            if (Number.isFinite(lFL) && lFL > 0) {
              if (!pwiFlStatMap.has(lFL)) pwiFlStatMap.set(lFL, { temps: [], winds: [] });
              if (Number.isFinite(lTemp)) pwiFlStatMap.get(lFL).temps.push(lTemp);
              if (Number.isFinite(lWind)) pwiFlStatMap.get(lFL).winds.push(lWind);

              if (!pwiEntry.flStats.has(lFL)) {
                pwiEntry.flStats.set(lFL, {
                  minTemp: null,
                  maxTemp: null,
                  maxWind: null,
                  minWind: null,
                  marker: cm,
                  markerForMinTemp: null,
                  markerForMaxTemp: null,
                  markerForMaxWind: null
                });
              }
              const flEntry = pwiEntry.flStats.get(lFL);
              flEntry.marker = cm;
              if (Number.isFinite(lTemp)) {
                if (flEntry.minTemp === null || lTemp < flEntry.minTemp) {
                  flEntry.minTemp = lTemp;
                  flEntry.markerForMinTemp = cm;
                }
                if (flEntry.maxTemp === null || lTemp > flEntry.maxTemp) {
                  flEntry.maxTemp = lTemp;
                  flEntry.markerForMaxTemp = cm;
                }
              }
              if (Number.isFinite(lWind)) {
                if (flEntry.maxWind === null || lWind > flEntry.maxWind) {
                  flEntry.maxWind = lWind;
                  flEntry.markerForMaxWind = cm;
                }
                if (flEntry.minWind === null || lWind < flEntry.minWind) flEntry.minWind = lWind;
              }
            }
          }
        }
      }
    }
  }

  // Replace the stats control so it always reflects the current data set.
  if (meteoStatsControl) {
    map.removeControl(meteoStatsControl);
    meteoStatsControl = null;
  }
  console.log('[meteo-stats] points collected:', meteoPoints.length,
    meteoPoints.map(p => ({ tail: p.tail, oat: p.oat, wind: p.windSpeedKmh })));
  const _statsCtrl = buildMeteoStatsControl(meteoPoints);
  if (_statsCtrl) meteoStatsControl = _statsCtrl.addTo(map);

  // Build and display the PWI route wind statistics panel.
  if (pwiStatsControl) {
    map.removeControl(pwiStatsControl);
    pwiStatsControl = null;
  }
  if (pwiWaypointStatMap.size > 0) {
    const pwiWpEntries = [...pwiWaypointStatMap.values()];
    const pwiFlEntries = [...pwiFlStatMap.entries()].map(([fl, data]) => ({
      fl,
      minTemp: data.temps.length ? Math.min(...data.temps) : null,
      maxWind: data.winds.length ? Math.max(...data.winds) : null,
    }));
    const _pwiCtrl = buildPWIStatsControl(pwiWpEntries, pwiFlEntries);
    if (_pwiCtrl) pwiStatsControl = _pwiCtrl.addTo(map);
  }

  if (allLatLngs.length > 1){
    map.fitBounds(L.latLngBounds(allLatLngs).pad(0.15));
  } else if (firstPoint) {
    map.setView([firstPoint.lat, firstPoint.lon], 7);
  }

  marker = firstPopupMarker;

  setTimeout(() => {
    try { map.invalidateSize(); } catch(e) {}
    if (openFirstPopup && firstPopupMarker){
      try { firstPopupMarker.openPopup(); } catch(e) {}
    }
  }, 60);
}


function openMapAllFiltered(){
  // Collect filtered rows that have either direct coords OR waypoint points
  const pts = [];
  for (const idx of filteredIdx){
    const r = rows[idx];
    const hasDirect = isNum(r.lat) && isNum(r.lon);
    const hasWpts = getWaypointsFromRow(r).length > 0;
    if (hasDirect || hasWpts){
      pts.push(r);
    }
  }
  if (!pts.length){
    alert("No points with coords or multi-waypoint (in current filter).");
    return;
  }
  openMapRows(pts, `Sve koordinate • tačaka: ${pts.length}`, false);
}

function openMapForRow(r){
  if (!getPrimaryMapPoint(r)){
    alert("No coordinates on this row.");
    return;
  }
  openMapRows([r], `${r.tail || 'Aircraft'} • ${formatTimestamp(r.timestamp)}`, true);
}

function waypointCoords(point){
  const lat = coerceNum(point && (point.latitude ?? point.lat));
  const lon = coerceNum(point && (point.longitude ?? point.lon));
  if (isNum(lat) && isNum(lon)) return { lat, lon };

  const compactName = String(point?.name || point?.waypoint || point?.position_name || '').trim().toUpperCase();
  const compactCoords = parseCompactWaypointCoords(compactName);
  if (compactCoords) return compactCoords;

  return null;
}

function parseCompactWaypointCoords(value){
  if (!/^[NS]\d{5}[EW]\d{6}$/.test(String(value || '').trim().toUpperCase())) return null;

  const text = String(value).trim().toUpperCase();
  const latDir = text[0];
  const lonDir = text[6];
  const latDigits = text.slice(1, 6);
  const lonDigits = text.slice(7, 13);

  const latDegrees = Number(latDigits.slice(0, 2));
  const latMinutes = Number(latDigits.slice(2, 4));
  const latTenths = Number(latDigits.slice(4, 5));
  const lonDegrees = Number(lonDigits.slice(0, 3));
  const lonMinutes = Number(lonDigits.slice(3, 5));
  const lonTenths = Number(lonDigits.slice(5, 6));

  if (![latDegrees, latMinutes, latTenths, lonDegrees, lonMinutes, lonTenths].every(Number.isFinite)) return null;

  let lat = latDegrees + ((latMinutes + latTenths / 10) / 60);
  let lon = lonDegrees + ((lonMinutes + lonTenths / 10) / 60);
  if (latDir === 'S') lat = -lat;
  if (lonDir === 'W') lon = -lon;
  return { lat, lon };
}

function waypointDistanceKm(a, b){
  if (!a || !b) return Infinity;
  const toRad = (value) => value * Math.PI / 180;
  const earthRadiusKm = 6371;
  const dLat = toRad(b.lat - a.lat);
  const dLon = toRad(b.lon - a.lon);
  const lat1 = toRad(a.lat);
  const lat2 = toRad(b.lat);
  const hav = Math.sin(dLat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLon / 2) ** 2;
  return 2 * earthRadiusKm * Math.atan2(Math.sqrt(hav), Math.sqrt(1 - hav));
}

function cloneWaypointPoint(point, defaults){
  if (point === null || point === undefined) return;

  const pointObj = (typeof point === 'string') ? { name: point } : point;
  if (!pointObj || typeof pointObj !== 'object') return null;
  const merged = Object.assign({}, defaults || {}, pointObj);
  const pointName = String(merged.name || merged.waypoint || merged.position_name || '').trim();
  if (pointName && !merged.name && !merged.waypoint) {
    merged.name = pointName;
  }
  return merged;
}

function appendWaypointPoint(points, point, defaults){
  const cloned = cloneWaypointPoint(point, defaults);
  if (cloned) points.push(cloned);
}

function findWaypointAnchor(points, startIndex, step){
  for (let index = startIndex; index >= 0 && index < points.length; index += step){
    const point = points[index];
    const direct = waypointCoords(point);
    if (direct) return direct;

    const pointName = String(point?.name || point?.waypoint || point?.position_name || '').trim();
    const candidates = getWaypointCandidatesByName(pointName);
    if (candidates.length === 1){
      return { lat: candidates[0].lat, lon: candidates[0].lon };
    }
  }
  return null;
}

function chooseWaypointCandidate(name, prevAnchor, nextAnchor){
  const candidates = getWaypointCandidatesByName(name);
  if (!candidates.length) return null;
  if (candidates.length === 1) return candidates[0];

  let best = candidates[0];
  let bestScore = Infinity;
  for (const candidate of candidates){
    const coord = { lat: candidate.lat, lon: candidate.lon };
    let score = 0;
    if (prevAnchor) score += waypointDistanceKm(coord, prevAnchor);
    if (nextAnchor) score += waypointDistanceKm(coord, nextAnchor);
    if (!prevAnchor && !nextAnchor) score = Math.abs(coord.lat) + Math.abs(coord.lon) / 10;
    if (score < bestScore){
      best = candidate;
      bestScore = score;
    }
  }
  return best;
}

function resolveWaypointSequence(points){
  const resolved = [];
  let previousResolved = null;

  for (let index = 0; index < points.length; index++){
    const current = Object.assign({}, points[index]);
    const direct = waypointCoords(current);
    if (direct){
      current.latitude = direct.lat;
      current.longitude = direct.lon;
      previousResolved = direct;
      resolved.push(current);
      continue;
    }

    const pointName = String(current?.name || current?.waypoint || current?.position_name || '').trim();
    if (!pointName){
      continue;
    }

    const nextAnchor = findWaypointAnchor(points, index + 1, 1);
    const candidate = chooseWaypointCandidate(pointName, previousResolved, nextAnchor);
    if (!candidate) continue;

    current.latitude = candidate.lat;
    current.longitude = candidate.lon;
    current.lookup_resolved = true;
    current.lookup_choice_count = getWaypointCandidatesByName(pointName).length;
    previousResolved = { lat: candidate.lat, lon: candidate.lon };
    resolved.push(current);
  }

  return resolved;
}

function aggregateWaypointPoints(points){
  const grouped = new Map();

  for (let index = 0; index < points.length; index++){
    const point = points[index];
    const coords = waypointCoords(point);
    const pointName = String(point?.name || point?.waypoint || point?.position_name || '').trim();
    const key = getWaypointAggregateKey(point);
    if (!coords || !key) continue;

    if (!grouped.has(key)){
      const base = Object.assign({}, point, {
        latitude: coords.lat,
        longitude: coords.lon,
        name: point?.name || point?.waypoint || pointName,
        _waypointKey: key,
        layers: [],
        _order: index
      });
      grouped.set(key, base);
    }

    const target = grouped.get(key);
    target.lookup_resolved = !!(target.lookup_resolved || point.lookup_resolved);

    const layerFlightLevel = coerceNum(point?.flight_level ?? point?.flightLevel);
    const layerWindDir = coerceNum(point?.wind_dir ?? point?.windDir);
    const layerWindSpeed = coerceNum(point?.wind_speed ?? point?.windSpeed);
    const layerTemperature = coerceNum(point?.temperature ?? point?.temp);
    const hasLayerData = Number.isFinite(layerFlightLevel) || Number.isFinite(layerWindDir) || Number.isFinite(layerWindSpeed) || Number.isFinite(layerTemperature);
    if (hasLayerData){
      const layerKey = [
        Number.isFinite(layerFlightLevel) ? Math.round(layerFlightLevel) : '',
        Number.isFinite(layerWindDir) ? Math.round(layerWindDir) : '',
        Number.isFinite(layerWindSpeed) ? Math.round(layerWindSpeed) : '',
        Number.isFinite(layerTemperature) ? Math.round(layerTemperature) : ''
      ].join('|');

      if (!target._layerSeen) target._layerSeen = new Set();
      if (!target._layerSeen.has(layerKey)){
        target._layerSeen.add(layerKey);
        target.layers.push({
          flight_level: layerFlightLevel,
          wind_dir: layerWindDir,
          wind_speed: layerWindSpeed,
          temperature: layerTemperature
        });
      }
    }
  }

  return [...grouped.values()]
